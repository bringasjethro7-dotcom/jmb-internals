<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMB Virtuals — Office Wallboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#080a0f; --bg1:#0c111b;
    --gold:#e6b98c; --gold2:#f2d6b4; --goldDim:#b98f63;
    --t1:#f1eee8; --t2:#a6adbd; --t3:#666e80;
    --line:rgba(255,255,255,.075); --line2:rgba(255,255,255,.12);
    --card:rgba(255,255,255,.032);
    --green:#7fd1a8; --blue:#8ab4f8; --amber:#e9c46a; --slate:#8b93a6;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:var(--sans); color:var(--t1); height:100vh; width:100vw; cursor:none;
    background:
      radial-gradient(1500px 900px at 50% -12%, rgba(230,185,140,.12), transparent 58%),
      radial-gradient(1200px 900px at 100% 108%, rgba(120,140,200,.07), transparent 60%),
      linear-gradient(180deg,var(--bg1),var(--bg0));
  }
  .stagewrap{position:absolute;inset:0;display:flex;flex-direction:column}

  /* ── Top bar ── */
  header{display:flex;align-items:center;justify-content:space-between;padding:3vh 3.6vw 0}
  .brand{display:flex;align-items:center;gap:1.5vw}
  .brand .mark{width:5.6vh;height:5.6vh;filter:drop-shadow(0 0 18px rgba(230,150,80,.35))}
  .brand .bt{font-family:var(--serif);font-size:3.4vh;font-weight:600;letter-spacing:.5px;line-height:1}
  .brand .bt em{font-style:italic;color:var(--gold)}
  .brand .bs{font-size:1.3vh;color:var(--t3);font-weight:500;letter-spacing:.42em;text-transform:uppercase;margin-top:.9vh}
  .live{display:flex;align-items:center;gap:.5vw;font-size:1.25vh;font-weight:600;color:var(--green);letter-spacing:.22em;text-transform:uppercase;margin-top:.6vh}
  .live i{width:.9vh;height:.9vh;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(127,209,168,.5)}50%{opacity:.45;box-shadow:0 0 0 1.1vh rgba(127,209,168,0)}}
  .clock{text-align:right}
  .clock .t{font-family:var(--serif);font-size:5.2vh;font-weight:500;line-height:.9;font-variant-numeric:tabular-nums;letter-spacing:.5px}
  .clock .d{font-size:1.5vh;color:var(--t2);font-weight:500;margin-top:1vh;letter-spacing:.06em}

  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--line2) 20%,var(--line2) 80%,transparent);margin:2.4vh 3.6vw 0}

  /* ── Stage / panels ── */
  .stage{flex:1;position:relative;margin:2.6vh 3.6vw 1vh}
  .panel{position:absolute;inset:0;opacity:0;transform:translateY(2vh);transition:opacity 1s ease,transform 1s ease;pointer-events:none;display:flex;flex-direction:column}
  .panel.active{opacity:1;transform:none}
  .eyebrow{display:flex;align-items:center;gap:1.1vw;margin-bottom:3vh}
  .eyebrow .ei{width:3vh;height:3vh;color:var(--gold)}
  .eyebrow .et{font-size:1.7vh;font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)}
  .eyebrow .eln{flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}

  /* Hero */
  .hero{align-items:center;justify-content:center;text-align:center}
  .hero .mk{width:15vh;height:15vh;filter:drop-shadow(0 0 46px rgba(230,150,80,.45));animation:float 7s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.4vh)}}
  .hero h1{font-family:var(--serif);font-size:11vh;font-weight:600;letter-spacing:1px;margin:3.4vh 0 0;line-height:.95}
  .hero h1 em{font-style:italic;color:var(--gold)}
  .hero .tag{font-family:var(--serif);font-size:3.8vh;font-style:italic;color:var(--t2);margin-top:2.6vh;font-weight:500}
  .hero .sub{font-size:1.6vh;color:var(--t3);margin-top:4vh;letter-spacing:.5em;text-transform:uppercase;font-weight:500}

  /* Online */
  .onlinehead{display:flex;align-items:flex-end;gap:1.6vw;margin-bottom:2.4vh}
  .onlinehead .big{font-family:var(--serif);font-size:9vh;font-weight:600;color:var(--gold);line-height:.85}
  .onlinehead .lbl{font-size:2.2vh;color:var(--t2);font-weight:500;padding-bottom:1vh}
  .ogrid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(15.5vw,1fr));grid-auto-rows:min-content;gap:1.5vh 1.4vw;align-content:start;overflow:hidden}
  .ocard{display:flex;align-items:center;gap:1.1vw;background:var(--card);border:1px solid var(--line);border-radius:1.4vh;padding:1.2vh 1.2vw}
  .oav{width:6.2vh;height:6.2vh;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--line2);background:#141a25;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:2.6vh;font-weight:600;color:var(--gold)}
  .oc-body{min-width:0}
  .oc-name{font-size:2vh;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .oc-stat{font-size:1.4vh;font-weight:500;margin-top:.5vh;display:inline-flex;align-items:center;gap:.55vw;color:var(--t2)}
  .dot{width:1vh;height:1vh;border-radius:50%;display:inline-block;background:var(--slate)}
  .s-working .dot{background:var(--green)} .s-working{color:var(--green)}
  .s-online .dot{background:var(--blue)} .s-online{color:var(--blue)}
  .s-paused .dot{background:var(--amber)} .s-paused{color:var(--amber)}
  .s-idle .dot{background:var(--slate)}
  .empty-note{color:var(--t3);font-family:var(--serif);font-style:italic;font-size:3.2vh;text-align:center;margin:auto}

  /* Announcements */
  .anns{flex:1;display:flex;flex-direction:column;gap:2.2vh;overflow:hidden}
  .ann{background:var(--card);border:1px solid var(--line);border-left:2px solid var(--gold);border-radius:1.4vh;padding:2.6vh 2.6vw}
  .ann .a-t{font-family:var(--serif);font-size:3.6vh;font-weight:600;line-height:1.1}
  .ann .a-b{font-size:2vh;color:var(--t2);line-height:1.55;margin-top:1.3vh;white-space:pre-wrap;font-weight:400}
  .ann .a-m{font-size:1.35vh;color:var(--t3);margin-top:1.6vh;font-weight:500;letter-spacing:.05em}

  /* Celebrations */
  .celeb{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:2vw}
  .celcol{background:var(--card);border:1px solid var(--line);border-radius:1.8vh;padding:2.8vh 2.2vw;overflow:hidden}
  .celcol h3{font-family:var(--serif);font-size:3vh;font-weight:600;margin-bottom:2.2vh;display:flex;align-items:center;gap:1vw}
  .celcol h3 svg{width:3.2vh;height:3.2vh;color:var(--gold)}
  .celrow{display:flex;align-items:center;gap:1.3vw;padding:1.5vh 0;border-top:1px solid var(--line)}
  .celrow:first-of-type{border-top:none}
  .celrow .ca{width:6.4vh;height:6.4vh;border-radius:50%;object-fit:cover;border:1px solid var(--line2);background:#141a25;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:2.6vh;font-weight:600;color:var(--gold)}
  .celrow .cn{font-size:2.3vh;font-weight:600}
  .celrow .cd{font-size:1.6vh;color:var(--t2);margin-top:.3vh;font-weight:400}
  .celrow .cbadge{margin-left:auto;font-family:var(--serif);font-size:2.2vh;font-weight:600;color:var(--gold);display:flex;align-items:center;gap:.5vw}
  .cel-empty{color:var(--t3);font-family:var(--serif);font-style:italic;font-size:2.2vh;padding:2.4vh .2vw}

  /* About / services */
  .lead{font-family:var(--serif);font-size:4vh;line-height:1.42;color:var(--t1);font-weight:500;max-width:66vw}
  .lead em{font-style:italic;color:var(--gold)}
  .svcs{display:grid;grid-template-columns:repeat(3,1fr);gap:1.6vw;margin-top:auto}
  .svc{background:var(--card);border:1px solid var(--line);border-radius:1.6vh;padding:2.6vh 1.8vw}
  .svc .ic{width:4.4vh;height:4.4vh;color:var(--gold)}
  .svc .st{font-size:2.3vh;font-weight:600;margin-top:1.4vh}
  .svc .sd{font-size:1.55vh;color:var(--t2);margin-top:.8vh;line-height:1.5;font-weight:400}

  /* Mission / vision / values */
  .mvv{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.8vw}
  .mv{background:var(--card);border:1px solid var(--line);border-radius:1.8vh;padding:3.2vh 2.1vw;display:flex;flex-direction:column}
  .mv .mh{font-size:1.5vh;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--gold)}
  .mv .mt{font-family:var(--serif);font-size:2.9vh;line-height:1.4;margin-top:2.2vh;font-weight:500}
  .vals{display:flex;flex-direction:column;gap:1.8vh;margin-top:2.2vh}
  .val{display:flex;align-items:center;gap:1.1vw;font-size:2.2vh;font-weight:500}
  .val svg{width:3vh;height:3vh;color:var(--gold);flex-shrink:0}

  /* Numbers */
  .nums{flex:1;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:1fr 1fr;gap:1.8vw}
  .num{background:var(--card);border:1px solid var(--line);border-radius:1.8vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative}
  .num svg{width:3.6vh;height:3.6vh;color:var(--goldDim);margin-bottom:1.6vh}
  .num .n{font-family:var(--serif);font-size:11vh;font-weight:600;line-height:.85;color:var(--gold)}
  .num .l{font-size:1.9vh;color:var(--t2);font-weight:500;margin-top:1.6vh;letter-spacing:.14em;text-transform:uppercase}

  /* Ticker */
  .ticker{height:6vh;display:flex;align-items:center;gap:1.4vw;padding:0 3.6vw;border-top:1px solid var(--line);background:rgba(0,0,0,.22)}
  .ticker .tk-lbl{font-size:1.4vh;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);flex-shrink:0}
  .ticker .tk-track{flex:1;overflow:hidden;white-space:nowrap;position:relative}
  .ticker .tk-move{display:inline-block;padding-left:100%;animation:tk 38s linear infinite;font-size:1.9vh;color:var(--t2);font-weight:500;letter-spacing:.02em}
  .ticker .tk-move b{color:var(--t1);font-weight:600}
  .ticker .sep{color:var(--goldDim);margin:0 1.4vw;font-size:1.4vh}
  @keyframes tk{from{transform:translateX(0)}to{transform:translateX(-100%)}}

  .dots{position:absolute;bottom:.4vh;left:50%;transform:translateX(-50%);display:flex;gap:.9vw;z-index:5}
  .dots i{width:.8vh;height:.8vh;border-radius:50%;background:var(--line2);transition:all .5s}
  .dots i.on{background:var(--gold);width:3.4vw;border-radius:99px}

  #fsbtn{position:fixed;bottom:2vh;right:2vw;z-index:99;background:var(--card);border:1px solid var(--line);color:var(--t2);
    font-size:1.5vh;padding:1vh 1.4vw;border-radius:1vh;cursor:pointer;font-family:inherit;opacity:.4;display:flex;align-items:center;gap:.6vw}
  #fsbtn svg{width:1.8vh;height:1.8vh}
  #fsbtn:hover{opacity:1}
</style>
</head>

<script>

var SVG = {
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',

function ic(name){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+(SVG[name]||'')+'</svg>'; }

var EMPLOYEES=[], ONLINE=[], ANNS=[], supa=null;
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function initials(n){ var p=String(n||'').trim().split(/[\s,]+/).filter(Boolean); return ((p[0]||'?')[0]+(p[1]?p[1][0]:'')).toUpperCase(); }
function av(photo,name,cls){ return photo ? '<img class="'+cls+'" src="'+esc(photo)+'" alt="">' : '<div class="'+cls+'">'+esc(initials(name))+'</div>'; }
function firstName(n){ var s=String(n||''); if(s.indexOf(',')>=0){ return s.split(',')[1].trim().split(' ')[0]; } return s.split(' ')[0]; }

function tickClock(){
  var now=new Date();
  document.getElementById('clk').textContent=now.toLocaleTimeString('en-US',{timeZone:'Asia/Manila',hour:'2-digit',minute:'2-digit',hour12:true});
  document.getElementById('dte').textContent=now.toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
setInterval(tickClock,1000); tickClock();

async function loadEmployees(){ try{ var r=await fetch(APPS_SCRIPT_URL+'?action=get_all_employees&_='+Date.now()); var d=await r.json();
  EMPLOYEES=(d.employees||[]).filter(function(e){ var s=String(e.status||'active').toLowerCase(); return s!=='inactive'&&s!=='resigned'&&s!=='terminated'&&s!=='archived'; }); }catch(e){} }
async function loadAnns(){ try{ var r=await fetch(APPS_SCRIPT_URL+'?action=get_notifications&employee_id=&_='+Date.now()); var d=await r.json();
  ANNS=(d.notifications||[]).filter(function(n){ return n.title; }).slice(0,6); }catch(e){} }
async function loadPresence(){ if(!supa) return; try{ var res=await supa.from('presence').select('*');
  if(res&&res.data){ ONLINE=res.data.filter(function(p){ return p.is_online && String(p.status||'').toLowerCase()!=='offline'; }); } }catch(e){} }
function initSupa(){ try{ supa=window.supabase.createClient(SUPA_URL,SUPA_KEY); loadPresence();
  supa.channel('wallboard-presence').on('postgres_changes',{event:'*',schema:'public',table:'presence'},function(){ loadPresence(); }).subscribe(); }catch(e){} }

/* ── panels ── */
function pHero(){
  return '<div class="panel hero" data-p>'+
    '<svg class="mk" viewBox="76 82 360 360" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="hm" x1="0" y1=".05" x2="0" y2=".95"><stop offset="0" stop-color="#FFE0BE"/><stop offset=".16" stop-color="#FFB16A"/><stop offset=".46" stop-color="#FF7A29"/><stop offset=".78" stop-color="#F1560F"/><stop offset="1" stop-color="#C3380A"/></linearGradient><linearGradient id="hb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FF8E45"/><stop offset=".55" stop-color="#E64C10"/><stop offset="1" stop-color="#A52E08"/></linearGradient></defs><rect x="241" y="110" width="30" height="304" rx="15" fill="url(#hm)"/><path d="M256 226Q341 264 398 320Q341 376 256 414Q171 376 114 320Q171 264 256 226Z" fill="none" stroke="url(#hb)" stroke-width="50" stroke-linejoin="round" stroke-linecap="round"/><path d="M256 110Q341 148 398 204Q341 260 256 298Q171 260 114 204Q171 148 256 110Z" fill="none" stroke="url(#hm)" stroke-width="50" stroke-linejoin="round" stroke-linecap="round"/></svg>'+
    '<h1>JMB <em>Virtuals</em></h1><div class="tag">'+esc(COMPANY.tagline)+'</div><div class="sub">Welcome to our office</div></div>';
}
function pOnline(){
  var stMap={working:'Working',online:'Online',paused:'On break',idle:'Idle',meeting:'In a meeting',break:'On break'};
  var cards=ONLINE.map(function(p){ var st=String(p.status||'online').toLowerCase();
    var cls=(st==='working'||st==='online'||st==='paused'||st==='idle')?st:'online';
    return '<div class="ocard">'+av(p.photo,p.employee_name,'oav')+'<div class="oc-body"><div class="oc-name">'+esc(p.employee_name||p.employee_id)+'</div>'+
      '<div class="oc-stat s-'+cls+'"><span class="dot"></span>'+esc(stMap[st]||'Online')+'</div></div></div>'; }).join('');
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('users')+'</span><span class="et">Who\'s Online</span><span class="eln"></span></div>'+
    '<div class="onlinehead"><span class="big">'+ONLINE.length+'</span><span class="lbl">teammate'+(ONLINE.length===1?'':'s')+' with us right now</span></div>'+
    (ONLINE.length? '<div class="ogrid">'+cards+'</div>' : '<div class="empty-note">A quiet moment — no one is clocked in just now.</div>')+'</div>';
}
function pAnns(){
  var list=ANNS.slice(0,3).map(function(a){ return '<div class="ann"><div class="a-t">'+esc(a.title)+'</div>'+(a.body?'<div class="a-b">'+esc(a.body)+'</div>':'')+(a.created_at?'<div class="a-m">'+esc(a.created_at)+'</div>':'')+'</div>'; }).join('');
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('megaphone')+'</span><span class="et">Announcements</span><span class="eln"></span></div>'+
    (ANNS.length? '<div class="anns">'+list+'</div>' : '<div class="empty-note">No announcements at the moment.</div>')+'</div>';
}
function _mmdd(s){ var m=String(s||'').match(/(\d{4})-(\d{2})-(\d{2})/); return m?{y:+m[1],mo:+m[2],d:+m[3]}:null; }
function celebrations(){
  var pht=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila'}));
  var tm=pht.getMonth()+1, td=pht.getDate(), bdays=[], anns=[];
  EMPLOYEES.forEach(function(e){ var b=_mmdd(e.birthday); if(b&&b.mo===tm&&b.d===td) bdays.push({e:e});
    var s=_mmdd(e.start_date); if(s&&s.mo===tm&&s.d===td&&s.y<pht.getFullYear()) anns.push({e:e,yr:pht.getFullYear()-s.y}); });
  return {bdays:bdays,anns:anns};
}
function pCeleb(){
  var c=celebrations();
  var b=c.bdays.length? c.bdays.map(function(x){ return '<div class="celrow">'+av(x.e.photo,x.e.full_name,'ca')+'<div><div class="cn">'+esc(x.e.full_name)+'</div><div class="cd">'+esc(x.e.position||'Team')+'</div></div></div>'; }).join('') : '<div class="cel-empty">No birthdays today</div>';
  var a=c.anns.length? c.anns.map(function(x){ return '<div class="celrow">'+av(x.e.photo,x.e.full_name,'ca')+'<div><div class="cn">'+esc(x.e.full_name)+'</div><div class="cd">'+esc(x.e.position||'Team')+'</div></div><div class="cbadge">'+x.yr+' yr'+(x.yr===1?'':'s')+'</div></div>'; }).join('') : '<div class="cel-empty">No anniversaries today</div>';
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('award')+'</span><span class="et">Celebrations Today</span><span class="eln"></span></div>'+
    '<div class="celeb"><div class="celcol"><h3>'+ic('cake')+' Happy Birthday</h3>'+b+'</div>'+
    '<div class="celcol"><h3>'+ic('award')+' Work Anniversary</h3>'+a+'</div></div></div>';
}
function pAbout(){
  var svc=COMPANY.services.map(function(s){ return '<div class="svc"><span class="ic">'+ic(s.ic)+'</span><div class="st">'+esc(s.t)+'</div><div class="sd">'+esc(s.d)+'</div></div>'; }).join('');
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('users')+'</span><span class="et">Who We Are</span><span class="eln"></span></div>'+
    '<div class="lead">'+esc(COMPANY.about)+'</div><div class="svcs">'+svc+'</div></div>';
}
function pMVV(){
  var vals=COMPANY.values.map(function(v){ return '<div class="val">'+ic(v.ic)+esc(v.t)+'</div>'; }).join('');
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('shield')+'</span><span class="et">What We Stand For</span><span class="eln"></span></div>'+
    '<div class="mvv"><div class="mv"><div class="mh">Mission</div><div class="mt">'+esc(COMPANY.mission)+'</div></div>'+
    '<div class="mv"><div class="mh">Vision</div><div class="mt">'+esc(COMPANY.vision)+'</div></div>'+
    '<div class="mv"><div class="mh">Core Values</div><div class="vals">'+vals+'</div></div></div></div>';
}
function pNumbers(){
  var head=EMPLOYEES.length, online=ONLINE.length, yrs=Math.max(1,(new Date().getFullYear())-COMPANY.founded);
  var projs={}; EMPLOYEES.forEach(function(e){ if(e.client) projs[String(e.client).toLowerCase()]=1; }); var clients=Object.keys(projs).length;
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('activity')+'</span><span class="et">JMB by the Numbers</span><span class="eln"></span></div>'+
    '<div class="nums">'+
      '<div class="num">'+ic('users')+'<div class="n">'+head+'</div><div class="l">Team members</div></div>'+
      '<div class="num">'+ic('activity')+'<div class="n">'+online+'</div><div class="l">Online right now</div></div>'+
      '<div class="num">'+ic('briefcase')+'<div class="n">'+(clients||'—')+'</div><div class="l">Clients served</div></div>'+
      '<div class="num">'+ic('calendar')+'<div class="n">'+yrs+'</div><div class="l">Year'+(yrs===1?'':'s')+' strong</div></div>'+
    '</div></div>';
}

var PANELS=[pHero,pOnline,pAnns,pCeleb,pAbout,pMVV,pNumbers], cur=0;
function buildStage(){
  var stage=document.getElementById('stage');
  stage.innerHTML=PANELS.map(function(fn){ return fn(); }).join('');
  document.getElementById('dots').innerHTML=PANELS.map(function(_,i){ return '<i'+(i===cur?' class="on"':'')+'></i>'; }).join('');
  var els=stage.querySelectorAll('.panel'); if(els[cur]) els[cur].classList.add('active');
}
function showPanel(i){
  var stage=document.getElementById('stage'); var els=stage.querySelectorAll('.panel'); if(!els.length) return;
  els.forEach(function(e){ e.classList.remove('active'); });
  cur=(i+PANELS.length)%PANELS.length;
  els[cur].outerHTML=PANELS[cur]();
  els=stage.querySelectorAll('.panel'); els[cur].classList.add('active');
  var dots=document.getElementById('dots').children; for(var k=0;k<dots.length;k++) dots[k].className=(k===cur?'on':'');
}
function nextPanel(){ showPanel(cur+1); }

function updateTicker(){
  var bits=['Welcome to JMB Virtuals','<b>'+ONLINE.length+'</b> teammates online now'];
  var c=celebrations();
  c.bdays.forEach(function(x){ bits.push('Happy Birthday, <b>'+esc(firstName(x.e.full_name))+'</b>'); });
  c.anns.forEach(function(x){ bits.push('<b>'+esc(firstName(x.e.full_name))+'</b> — '+x.yr+' year'+(x.yr===1?'':'s')+' with JMB'); });
  ANNS.slice(0,3).forEach(function(a){ bits.push(esc(a.title)); });
  bits.push(esc(COMPANY.tagline));
  document.getElementById('tk').innerHTML=bits.join('<span class="sep">◆</span>');
}

function goFull(){ var el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el); document.getElementById('fsbtn').style.display='none'; }
document.addEventListener('keydown',function(e){ if(e.key==='f'||e.key==='F') goFull(); if(e.key==='ArrowRight') nextPanel(); if(e.key==='ArrowLeft') showPanel(cur-1); });

async function boot(){
  initSupa();
  await Promise.all([loadEmployees(), loadAnns()]);
  buildStage(); updateTicker();
  setInterval(nextPanel, 16000);
  setInterval(loadPresence, 20000);
  setInterval(function(){ loadAnns().then(updateTicker); }, 60000);
  setInterval(loadEmployees, 600000);
  setInterval(updateTicker, 30000);
}
window.addEventListener('load', boot);
</script>
</body>
</html>
