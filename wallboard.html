<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMB Virtuals — Office Wallboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#f5f3ef; --bg1:#fdfcfa;
    --ink:#141a24; --ink2:#57606f; --ink3:#98a0ae;
    --o1:#ff5a00; --o2:#e35000; --oSoft:#fff1e7;
    --card:#ffffff; --line:rgba(20,26,36,.08); --line2:rgba(20,26,36,.14);
    --green:#16a34a; --blue:#2563eb; --amber:#d97706; --slate:#9aa3b2;
    --sh:0 16px 42px rgba(20,26,36,.08), 0 3px 10px rgba(20,26,36,.045);
    --shSoft:0 8px 22px rgba(20,26,36,.05);
    --sans:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--sans);color:var(--ink);height:100vh;width:100vw;cursor:none;
    background:radial-gradient(1500px 900px at 50% -22%, rgba(255,90,0,.08), transparent 55%),linear-gradient(180deg,var(--bg1),var(--bg0));}
  /* Fill the whole screen with just a hair of safe edge so TV overscan doesn't clip anything.
     Explicit top/left/right/bottom (not the `inset` shorthand) for older smart-TV browsers. */
  .wrap{position:absolute;top:1.4vh;left:1.6vw;right:1.6vw;bottom:1.4vh;display:flex;flex-direction:column}

  header{display:flex;align-items:center;justify-content:space-between;padding:.6vh .6vw 0}
  .brand{display:flex;align-items:center;gap:1.4vw}
  .brand .mark{width:6vh;height:6vh}
  .brand .bt{font-size:3vh;font-weight:800;letter-spacing:.02em;line-height:1;color:var(--ink)}
  .brand .bt em{font-style:normal;color:var(--o1)}
  .brand .bs{font-size:1.2vh;color:var(--ink3);font-weight:700;letter-spacing:.34em;text-transform:uppercase;margin-top:.9vh}
  .live{display:inline-flex;align-items:center;gap:.5vw;font-size:1.15vh;font-weight:800;color:var(--green);letter-spacing:.16em;text-transform:uppercase;background:rgba(22,163,74,.1);border-radius:99px;padding:.5vh .9vw;margin-top:.7vh}
  .live i{width:.8vh;height:.8vh;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(22,163,74,.4)}50%{opacity:.5;box-shadow:0 0 0 1vh rgba(22,163,74,0)}}
  .clock{text-align:right}
  .clock .t{font-size:5vh;font-weight:800;line-height:.9;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .clock .d{font-size:1.45vh;color:var(--ink2);font-weight:600;margin-top:1vh;letter-spacing:.03em}

  .stage{flex:1;min-height:0;position:relative;margin:2.6vh 1vw 1vh}
  .panel{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;opacity:0;transform:translateY(1.8vh);transition:opacity .9s ease,transform .9s ease;pointer-events:none}
  .panel.active{opacity:1;transform:none}
  /* auto-fit wrapper: scaled by JS so a panel's content always fits the screen exactly */
  .pin{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;transform-origin:top left}
  .eyebrow{display:flex;align-items:center;gap:1vw;margin-bottom:3vh}
  .eyebrow .ei{width:2.8vh;height:2.8vh;color:var(--o1)}
  .eyebrow .et{font-size:1.7vh;font-weight:800;letter-spacing:.26em;text-transform:uppercase;color:var(--o1)}
  .eyebrow .eln{flex:1;height:2px;background:linear-gradient(90deg,var(--line2),transparent);border-radius:2px}

  /* Hero */
  .hero{justify-content:center}
  .hero .kick{font-size:1.7vh;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--o1);margin-bottom:3vh}
  .hero h1{font-size:10.5vh;font-weight:800;letter-spacing:-.02em;line-height:.98;color:var(--ink)}
  .hero h1 em{font-style:normal;color:var(--o1)}
  .hero .sub{font-size:2.9vh;color:var(--ink2);margin-top:3.4vh;font-weight:500;max-width:70vw;line-height:1.4}
  .hero .sub b{color:var(--ink);font-weight:700}

  /* Who we are */
  .lead{font-size:4vh;line-height:1.35;color:var(--ink);font-weight:600;max-width:74vw;letter-spacing:-.01em}
  .lead em{font-style:normal;color:var(--o1)}
  .lead .small{display:block;font-size:2.3vh;color:var(--ink2);font-weight:500;line-height:1.5;margin-top:3vh;max-width:70vw}

  /* Services */
  .svcs{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:1.5vw}
  .svc{background:var(--card);border:1px solid var(--line);border-radius:1.8vh;padding:2.6vh 2vw;box-shadow:var(--shSoft);display:flex;flex-direction:column}
  .svc .no{font-size:1.5vh;font-weight:800;color:var(--o1);letter-spacing:.1em}
  .svc .icw{width:5.6vh;height:5.6vh;border-radius:1.4vh;background:var(--oSoft);display:flex;align-items:center;justify-content:center;margin-top:1vh}
  .svc .icw svg{width:3.1vh;height:3.1vh;color:var(--o1)}
  .svc .st{font-size:2.3vh;font-weight:800;margin-top:1.4vh;color:var(--ink)}
  .svc .sd{font-size:1.55vh;color:var(--ink2);margin-top:.8vh;line-height:1.5;font-weight:500}

  /* Numbers */
  .nums{flex:1;min-height:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr;gap:1.5vw}
  .num{background:var(--card);border:1px solid var(--line);border-radius:2vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:var(--sh);padding:2vh}
  .num svg{width:3.4vh;height:3.4vh;color:var(--o1);margin-bottom:1.6vh}
  .num .n{font-size:9vh;font-weight:800;line-height:.85;color:var(--o1);letter-spacing:-.02em}
  .num .l{font-size:1.7vh;color:var(--ink2);font-weight:700;margin-top:1.6vh;letter-spacing:.08em;text-transform:uppercase}

  /* Principles */
  .prins{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1.6vw}
  .prin{background:var(--card);border:1px solid var(--line);border-radius:2vh;padding:3vh 2.4vw;box-shadow:var(--shSoft);display:flex;flex-direction:column;justify-content:center}
  .prin .pno{font-size:2.1vh;font-weight:800;color:var(--o1);letter-spacing:.05em}
  .prin .pt{font-size:3vh;font-weight:800;margin-top:1.4vh;color:var(--ink);letter-spacing:-.01em}
  .prin .pd{font-size:1.85vh;color:var(--ink2);margin-top:1.2vh;line-height:1.5;font-weight:500}

  /* Online */
  .onlinehead{display:flex;align-items:flex-end;gap:1.5vw;margin-bottom:2.4vh}
  .onlinehead .big{font-size:8.5vh;font-weight:800;color:var(--o1);line-height:.82;letter-spacing:-.02em}
  .onlinehead .lbl{font-size:2.1vh;color:var(--ink2);font-weight:600;padding-bottom:1vh}
  .ogrid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(15.5vw,1fr));grid-auto-rows:min-content;gap:1.4vh 1.4vw;align-content:start;overflow:hidden}
  .ocard{display:flex;align-items:center;gap:1.1vw;background:var(--card);border:1px solid var(--line);border-radius:1.5vh;padding:1.3vh 1.2vw;box-shadow:var(--shSoft)}
  .oav{width:5.8vh;height:5.8vh;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--oSoft);display:flex;align-items:center;justify-content:center;font-size:2.4vh;font-weight:800;color:var(--o1)}
  .oc-name{font-size:1.95vh;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .oc-stat{font-size:1.35vh;font-weight:600;margin-top:.5vh;display:inline-flex;align-items:center;gap:.55vw;color:var(--ink2)}
  .dot{width:.95vh;height:.95vh;border-radius:50%;display:inline-block;background:var(--slate)}
  .s-working .dot{background:var(--green)} .s-working{color:var(--green)}
  .s-online .dot{background:var(--blue)} .s-online{color:var(--blue)}
  .s-paused .dot{background:var(--amber)} .s-paused{color:var(--amber)}
  .s-idle .dot{background:var(--slate)}
  .empty-note{color:var(--ink3);font-size:3vh;font-weight:500;text-align:center;margin:auto}

  /* Announcements */
  .anns{flex:1;min-height:0;display:flex;flex-direction:column;gap:2.2vh;overflow:hidden}
  .ann{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--o1);border-radius:1.6vh;padding:2.6vh 2.6vw;box-shadow:var(--shSoft)}
  .ann .a-t{font-size:3.2vh;font-weight:800;line-height:1.12;color:var(--ink)}
  .ann .a-b{font-size:1.9vh;color:var(--ink2);line-height:1.55;margin-top:1.3vh;white-space:pre-wrap;font-weight:500}
  .ann .a-m{font-size:1.3vh;color:var(--ink3);margin-top:1.6vh;font-weight:700;letter-spacing:.04em}

  .ticker{height:6vh;display:flex;align-items:center;gap:1.4vw;padding:0 1vw;border-top:1px solid var(--line);background:rgba(255,255,255,.6)}
  .ticker .tk-lbl{font-size:1.3vh;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--o1);flex-shrink:0}
  .ticker .tk-track{flex:1;overflow:hidden;white-space:nowrap}
  .ticker .tk-move{display:inline-block;padding-left:100%;animation:tk 40s linear infinite;font-size:2.1vh;color:var(--ink2);font-weight:600}
  .ticker .tk-move b{color:var(--ink);font-weight:800}
  .ticker .sep{color:var(--o1);margin:0 1.4vw}
  @keyframes tk{from{transform:translateX(0)}to{transform:translateX(-100%)}}

  .dots{position:absolute;bottom:.4vh;left:50%;transform:translateX(-50%);display:flex;gap:.9vw;z-index:5}
  .dots i{width:.8vh;height:.8vh;border-radius:50%;background:var(--line2);transition:all .5s}
  .dots i.on{background:var(--o1);width:3.4vw;border-radius:99px}

  #fsbtn{position:fixed;bottom:2vh;right:2vw;z-index:99;background:var(--card);border:1px solid var(--line);color:var(--ink2);
    font-size:1.4vh;padding:1vh 1.4vw;border-radius:1vh;cursor:pointer;font-family:inherit;box-shadow:var(--shSoft);opacity:.5;display:flex;align-items:center;gap:.6vw}
  #fsbtn svg{width:1.7vh;height:1.7vh}
  #fsbtn:hover{opacity:1}
</style>
</head>
<body>
<button id="fsbtn" onclick="goFull()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg> Full screen</button>
<div class="wrap">
  <header>
    <div class="brand">
      <svg class="mark" viewBox="76 82 360 360" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="m" x1="0" y1=".05" x2="0" y2=".95"><stop offset="0" stop-color="#FFE0BE"/><stop offset=".16" stop-color="#FFB16A"/><stop offset=".46" stop-color="#FF7A29"/><stop offset=".78" stop-color="#F1560F"/><stop offset="1" stop-color="#C3380A"/></linearGradient><linearGradient id="b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FF8E45"/><stop offset=".55" stop-color="#E64C10"/><stop offset="1" stop-color="#A52E08"/></linearGradient></defs><rect x="241" y="110" width="30" height="304" rx="15" fill="url(#m)"/><path d="M256 226Q341 264 398 320Q341 376 256 414Q171 376 114 320Q171 264 256 226Z" fill="none" stroke="url(#b)" stroke-width="50" stroke-linejoin="round" stroke-linecap="round"/><path d="M256 110Q341 148 398 204Q341 260 256 298Q171 260 114 204Q171 148 256 110Z" fill="none" stroke="url(#m)" stroke-width="50" stroke-linejoin="round" stroke-linecap="round"/></svg>
      <div><div class="bt">JMB <em>VIRTUALS</em></div><div class="bs">We run the work behind the work</div><div class="live"><i></i> Live</div></div>
    </div>
    <div class="clock"><div class="t" id="clk">—</div><div class="d" id="dte">—</div></div>
  </header>
  <div class="stage" id="stage"></div>
  <div class="dots" id="dots"></div>
  <div class="ticker"><span class="tk-lbl">JMB Virtuals</span><div class="tk-track"><span class="tk-move" id="tk"></span></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ════ JMB VIRTUALS — OFFICE WALLBOARD (light · formal, matches jmbvirtuals.com) ════
   Edit COMPANY below. Stats you can't pull live (clients/satisfaction) are set here. */
const COMPANY = {
  positioning: "Premium virtual assistance at a fraction of the cost — so you get more done, spend less, and grow faster.",
  about: "JMB Virtuals is a Philippines-based group of Virtual Assistants built for businesses that need reliable, skilled, and proactive remote support.",
  aboutSub: "Our virtual assistants step in as a seamless extension of your operation — handling the tasks that consume your time so you can focus on strategy, growth, and what only you can do.",
  services: [
    { ic:"share",   t:"Social Media Management", d:"Content, scheduling, engagement and growth across all major platforms." },
    { ic:"headset", t:"Administrative Support",  d:"Email, calendar, data entry and document preparation." },
    { ic:"chat",    t:"Client Communication",    d:"Professional inbound handling, follow-ups and relationships." },
    { ic:"film",    t:"Graphics & Design",       d:"Brand visuals, social graphics, decks and marketing materials." },
    { ic:"book",    t:"Accounting VA",           d:"Bookkeeping, invoicing, expense tracking and reporting." },
    { ic:"trend",   t:"Web Development",         d:"Landing pages and business sites — fast and mobile-ready." }
  ],
  principles: [
    { t:"Proactive, not reactive.",   d:"We anticipate needs, flag issues early, and take initiative." },
    { t:"Precision in every task.",   d:"Every task gets the same level of care — from a calendar entry to a client email." },
    { t:"Transparent communication.", d:"Daily updates, clear reporting, honest feedback — always." },
    { t:"Your growth is our mission.",d:"Every task we handle is time you get back — and that compounds." }
  ],
  founded: 2022,
  clientsServed: 50,      // edit to your real figure
  satisfaction: 99        // % client satisfaction
};

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbOUn-0xO4r8H4bw4nA7YMfVb0yByOLL4TuRPKvtPh2rjY-b3rOJ5aBoIc8sOmO9kP/exec";
const SUPA_URL = 'https://rvyrnkjqxnijxydloujk.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2eXJua2pxeG5panh5ZGxvdWprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzAwODQsImV4cCI6MjA5NzE0NjA4NH0.SwkSkmbeWrhm5PZZDSZ1Z4hbjpQ0L2CRtuKQmpHshBE';

var SVG={
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  megaphone:'<path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>',
  share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/>',
  headset:'<path d="M3 14v-3a9 9 0 0 1 18 0v3"/><path d="M18 16.5v-3.5h1.5a1.5 1.5 0 0 1 1.5 1.5v.5a1.5 1.5 0 0 1-1.5 1.5H18zM6 16.5v-3.5H4.5A1.5 1.5 0 0 0 3 14.5v.5A1.5 1.5 0 0 0 4.5 16.5H6z"/><path d="M21 16v1a4 4 0 0 1-4 4h-4"/>',
  chat:'<path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  film:'<rect x="2.5" y="4" width="19" height="16" rx="2"/><path d="M7 4v16M17 4v16M2.5 12h19M2.5 8h4.5M2.5 16h4.5M17 8h4.5M17 16h4.5"/>',
  book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  trend:'<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
  briefcase:'<rect x="2.5" y="7" width="19" height="13.5" rx="2"/><path d="M16 20.5V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v15.5"/>',
  activity:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
  calendar:'<rect x="3" y="4.5" width="18" height="17" rx="2"/><path d="M16 2.5v4M8 2.5v4M3 10h18"/>',
  star:'<polygon points="12 2 15.1 8.3 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 8.9 8.3"/>',
  shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>'
};
function ic(n){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+(SVG[n]||'')+'</svg>'; }

var EMPLOYEES=[], ONLINE=[], ANNS=[], supa=null;
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function initials(n){ var p=String(n||'').trim().split(/[\s,]+/).filter(Boolean); return ((p[0]||'?')[0]+(p[1]?p[1][0]:'')).toUpperCase(); }
function av(photo,name,cls){ return photo ? '<img class="'+cls+'" src="'+esc(photo)+'" alt="">' : '<div class="'+cls+'">'+esc(initials(name))+'</div>'; }

function tickClock(){ var now=new Date();
  document.getElementById('clk').textContent=now.toLocaleTimeString('en-US',{timeZone:'Asia/Manila',hour:'2-digit',minute:'2-digit',hour12:true});
  document.getElementById('dte').textContent=now.toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
setInterval(tickClock,1000); tickClock();

async function loadEmployees(){ try{ var r=await fetch(APPS_SCRIPT_URL+'?action=get_all_employees&_='+Date.now()); var d=await r.json();
  EMPLOYEES=(d.employees||[]).filter(function(e){ var s=String(e.status||'active').toLowerCase(); return s!=='inactive'&&s!=='resigned'&&s!=='terminated'&&s!=='archived'; }); }catch(e){} }
async function loadAnns(){ try{ var r=await fetch(APPS_SCRIPT_URL+'?action=get_notifications&employee_id=&_='+Date.now()); var d=await r.json();
  ANNS=(d.notifications||[]).filter(function(n){ return n.title; }).slice(0,6); }catch(e){} }
async function loadPresence(){ if(!supa) return; try{ var res=await supa.from('presence').select('*');
  if(res&&res.data){ ONLINE=res.data.filter(function(p){ return p.is_online && String(p.status||'').toLowerCase()!=='offline'; }); } }catch(e){} }
function initSupa(){ try{ supa=window.supabase.createClient(SUPA_URL,SUPA_KEY); loadPresence();
  supa.channel('wallboard-presence').on('postgres_changes',{event:'*',schema:'public',table:'presence'},function(){ loadPresence(); }).subscribe(); }catch(e){} }

function logoSVG(cls){ return '<svg class="'+cls+'" viewBox="76 82 360 360" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="hm" x1="0" y1=".05" x2="0" y2=".95"><stop offset="0" stop-color="#FFE0BE"/><stop offset=".16" stop-color="#FFB16A"/><stop offset=".46" stop-color="#FF7A29"/><stop offset=".78" stop-color="#F1560F"/><stop offset="1" stop-color="#C3380A"/></linearGradient><linearGradient id="hb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FF8E45"/><stop offset=".55" stop-color="#E64C10"/><stop offset="1" stop-color="#A52E08"/></linearGradient></defs><rect x="241" y="110" width="30" height="304" rx="15" fill="url(#hm)"/><path d="M256 226Q341 264 398 320Q341 376 256 414Q171 376 114 320Q171 264 256 226Z" fill="none" stroke="url(#hb)" stroke-width="50" stroke-linejoin="round" stroke-linecap="round"/><path d="M256 110Q341 148 398 204Q341 260 256 298Q171 260 114 204Q171 148 256 110Z" fill="none" stroke="url(#hm)" stroke-width="50" stroke-linejoin="round" stroke-linecap="round"/></svg>'; }

function pHero(){ return '<div class="panel hero" data-p><div class="kick">Philippines-Based · Remote-Ready · Available Now</div>'+
  '<h1>We run the work<br><em>behind the work.</em></h1>'+
  '<div class="sub">'+esc(COMPANY.positioning)+'</div></div>'; }

function pWho(){ return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('users')+'</span><span class="et">Who We Are</span><span class="eln"></span></div>'+
  '<div style="display:flex;flex-direction:column;justify-content:center;flex:1"><div class="lead">A remote team. <em>A real partner.</em>'+
  '<span class="small">'+esc(COMPANY.about)+' '+esc(COMPANY.aboutSub)+'</span></div></div></div>'; }

function pServices(){ var svc=COMPANY.services.map(function(s,i){ return '<div class="svc"><span class="no">'+('0'+(i+1))+'</span><div class="icw">'+ic(s.ic)+'</div><div class="st">'+esc(s.t)+'</div><div class="sd">'+esc(s.d)+'</div></div>'; }).join('');
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('star')+'</span><span class="et">What We Do</span><span class="eln"></span></div><div class="svcs">'+svc+'</div></div>'; }

function pNumbers(){ var head=EMPLOYEES.length||0, yrs=Math.max(1,(new Date().getFullYear())-COMPANY.founded);
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('activity')+'</span><span class="et">JMB by the Numbers</span><span class="eln"></span></div>'+
    '<div class="nums">'+
      '<div class="num">'+ic('briefcase')+'<div class="n">'+COMPANY.clientsServed+'+</div><div class="l">Clients Served</div></div>'+
      '<div class="num">'+ic('calendar')+'<div class="n">'+yrs+'+</div><div class="l">Years in Business</div></div>'+
      '<div class="num">'+ic('users')+'<div class="n">'+(head||'—')+'</div><div class="l">Team Members</div></div>'+
      '<div class="num">'+ic('star')+'<div class="n">'+COMPANY.satisfaction+'%</div><div class="l">Client Satisfaction</div></div>'+
    '</div></div>'; }

function pPrinciples(){ var p=COMPANY.principles.map(function(x,i){ return '<div class="prin"><div class="pno">'+('0'+(i+1))+'</div><div class="pt">'+esc(x.t)+'</div><div class="pd">'+esc(x.d)+'</div></div>'; }).join('');
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('shield')+'</span><span class="et">How We Work</span><span class="eln"></span></div><div class="prins">'+p+'</div></div>'; }

function pOnline(){ var stMap={working:'Working',online:'Online',paused:'On break',idle:'Idle',meeting:'In a meeting',break:'On break'};
  var MAX=21, show=ONLINE.slice(0,MAX), extra=ONLINE.length-show.length;   // cap so it never overflows the TV
  var cards=show.map(function(p){ var st=String(p.status||'online').toLowerCase(); var cls=(st==='working'||st==='online'||st==='paused'||st==='idle')?st:'online';
    return '<div class="ocard">'+av(p.photo,p.employee_name,'oav')+'<div style="min-width:0"><div class="oc-name">'+esc(p.employee_name||p.employee_id)+'</div><div class="oc-stat s-'+cls+'"><span class="dot"></span>'+esc(stMap[st]||'Online')+'</div></div></div>'; }).join('');
  if(extra>0){ cards+='<div class="ocard" style="justify-content:center"><div class="oc-name" style="color:var(--o1)">+'+extra+' more online</div></div>'; }
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('users')+'</span><span class="et">Our Team, Live</span><span class="eln"></span></div>'+
    '<div class="onlinehead"><span class="big">'+ONLINE.length+'</span><span class="lbl">teammate'+(ONLINE.length===1?'':'s')+' online right now</span></div>'+
    (ONLINE.length? '<div class="ogrid">'+cards+'</div>' : '<div class="empty-note">A quiet moment — no one is clocked in just now.</div>')+'</div>'; }

function pAnns(){ var list=ANNS.slice(0,3).map(function(a){ return '<div class="ann"><div class="a-t">'+esc(a.title)+'</div>'+(a.body?'<div class="a-b">'+esc(a.body)+'</div>':'')+(a.created_at?'<div class="a-m">'+esc(a.created_at)+'</div>':'')+'</div>'; }).join('');
  return '<div class="panel" data-p><div class="eyebrow"><span class="ei">'+ic('megaphone')+'</span><span class="et">Announcements</span><span class="eln"></span></div>'+
    (ANNS.length? '<div class="anns">'+list+'</div>' : '<div class="empty-note">No announcements at the moment.</div>')+'</div>'; }

/* Announcements panel only appears in rotation when there is something to show. */
function panelList(){ var base=[pHero,pWho,pServices,pNumbers,pPrinciples,pOnline]; if(ANNS.length) base.splice(5,0,pAnns); return base; }
var cur=0;
/* Wrap a panel's content and scale it down if it's taller/wider than the screen — nothing is ever cut off. */
function ensurePin(panel){ var pin=panel.querySelector('.pin');
  if(!pin){ pin=document.createElement('div'); pin.className='pin'; while(panel.firstChild) pin.appendChild(panel.firstChild); panel.appendChild(pin); } return pin; }
function fitPanel(panel){ if(!panel) return; var pin=ensurePin(panel);
  pin.style.width='100%'; pin.style.height='100%'; pin.style.transform='none';
  requestAnimationFrame(function(){
    var sh=pin.scrollHeight, sw=pin.scrollWidth, ch=panel.clientHeight, cw=panel.clientWidth;
    if(ch<40 || cw<40) return;   // not laid out yet — never scale to a bad value
    var sc=Math.min(1, (ch-1)/(sh||1), (cw-1)/(sw||1));
    if(sc>0 && sc<0.999){ pin.style.height=(100/sc)+'%'; pin.style.width=(100/sc)+'%'; pin.style.transform='scale('+sc.toFixed(4)+')'; }
  });
}
function buildStage(){ var P=panelList(); var stage=document.getElementById('stage'); stage.innerHTML=P.map(function(fn){ return fn(); }).join('');
  document.getElementById('dots').innerHTML=P.map(function(_,i){ return '<i'+(i===cur?' class="on"':'')+'></i>'; }).join('');
  var els=stage.querySelectorAll('.panel'); els.forEach(function(e){ ensurePin(e); }); if(els[cur]){ els[cur].classList.add('active'); fitPanel(els[cur]); } }
function showPanel(i){ var P=panelList(); var stage=document.getElementById('stage'); var els=stage.querySelectorAll('.panel');
  if(els.length!==P.length){ cur=((i%P.length)+P.length)%P.length; buildStage(); return; }
  els.forEach(function(e){ e.classList.remove('active'); }); cur=((i%P.length)+P.length)%P.length; els[cur].outerHTML=P[cur]();
  els=stage.querySelectorAll('.panel'); ensurePin(els[cur]); els[cur].classList.add('active'); fitPanel(els[cur]);
  var dots=document.getElementById('dots').children; for(var k=0;k<dots.length;k++) dots[k].className=(k===cur?'on':''); }
function nextPanel(){ showPanel(cur+1); }
window.addEventListener('resize', function(){ var a=document.querySelector('.panel.active'); if(a) fitPanel(a); });

function updateTicker(){ var bits=['We run the work behind the work','<b>'+ONLINE.length+'</b> teammates online now'];
  ANNS.slice(0,3).forEach(function(a){ bits.push(esc(a.title)); }); bits.push(esc(COMPANY.positioning));
  document.getElementById('tk').innerHTML=bits.join('<span class="sep">◆</span>'); }
function goFull(){ var el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el); document.getElementById('fsbtn').style.display='none'; }
document.addEventListener('keydown',function(e){ if(e.key==='f'||e.key==='F') goFull(); if(e.key==='ArrowRight') nextPanel(); if(e.key==='ArrowLeft') showPanel(cur-1); });
async function boot(){ initSupa(); await Promise.all([loadEmployees(), loadAnns()]); buildStage(); updateTicker();
  setTimeout(function(){ var b=document.getElementById('fsbtn'); if(b) b.style.display='none'; }, 12000);   // auto-hide chrome
  setInterval(nextPanel,15000); setInterval(loadPresence,20000); setInterval(function(){ loadAnns().then(updateTicker); },60000); setInterval(loadEmployees,600000); setInterval(updateTicker,30000); }
window.addEventListener('load', boot);
</script>
</body>
