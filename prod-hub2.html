<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMB Virtuals — Productivity Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e14;--bg2:#0d1117;--card:#151b24;--card2:#1b222d;--line:rgba(255,255,255,.09);
 --o1:#ff6b1a;--o2:#e83d00;--t1:#e8eaf0;--t2:#9aa3b2;--t3:#5a6072;--green:#34d399;--red:#f87171;--blue:#38bdf8;--amber:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'JetBrains Mono',monospace}
#signin{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(255,107,26,.12),transparent 60%),var(--bg);z-index:50;padding:16px}
.sicard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 28px;width:340px;max-width:100%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.sicard h1{font-family:'Rajdhani',sans-serif;font-size:24px;letter-spacing:.04em;margin-bottom:2px}
.sicard h1 b{color:var(--o1)}
.sicard p{color:var(--t2);font-size:12.5px;margin-bottom:16px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:11px;color:var(--t1);padding:11px 13px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
.inp:focus{border-color:var(--o1)}
.btn{background:linear-gradient(135deg,var(--o1),var(--o2));color:#fff;border:none;border-radius:11px;padding:11px 16px;font-weight:700;font-size:14px}
.btn:hover{filter:brightness(1.08)}
.btn.sm{padding:8px 13px;font-size:13px;border-radius:9px}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--t2);font-weight:600}
.btn.ghost:hover{color:var(--t1);border-color:var(--o1)}
.btn.ghost.on{color:#fff;background:linear-gradient(135deg,rgba(255,107,26,.85),rgba(232,61,0,.7));border-color:transparent}
.err{color:var(--red);font-size:12.5px;margin-top:4px;display:none}
header{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--line);background:rgba(13,17,23,.85);position:sticky;top:0;z-index:20;backdrop-filter:blur(10px)}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;letter-spacing:.06em}
.logo b{color:var(--o1)}
.spacer{flex:1}
.who{font-size:13px;color:var(--t2)}.who b{color:var(--t1)}
main{padding:20px;max-width:1180px;margin:0 auto}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
.controls label{font-size:11px;color:var(--t2);display:flex;flex-direction:column;gap:3px}
.controls input[type=date]{background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--t1);padding:7px 10px;font-size:13px;font-family:inherit;outline:none}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--o1)}
.stat .v{font-size:24px;font-weight:800;font-family:'Rajdhani',sans-serif}
.stat .l{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 17px;margin-bottom:14px}
.tcard .th{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.tcard .tn{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700}
.tcard .tb{font-size:12px;color:var(--t2)}
.tcard .tb b{color:var(--o1)}
.urow{display:grid;grid-template-columns:22px 1fr 96px;align-items:center;gap:10px;margin:7px 0}
.urank{font-size:12px;font-weight:700;color:var(--t3);text-align:center}
.urow.top .urank{color:var(--o1)}
.uname{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.usub{font-size:11px;color:var(--t3);font-weight:400}
.ubarwrap{display:flex;align-items:center;gap:8px}
.ubar{flex:1;height:18px;border-radius:6px;background:var(--card2);overflow:hidden;position:relative}
.ubar>span{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--o1),var(--o2))}
.uqph{width:96px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.udelta{font-size:11px;font-weight:600;margin-left:6px}
.udelta.up{color:var(--green)}.udelta.down{color:var(--red)}
.benchline{position:absolute;top:-2px;bottom:-2px;width:2px;background:#fff;opacity:.5;z-index:2}
.muted{color:var(--t3);font-size:13px}
.empty{text-align:center;color:var(--t3);padding:36px;font-size:14px}
.legend{font-size:11.5px;color:var(--t3);margin:-6px 0 14px;display:flex;gap:14px;flex-wrap:wrap}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:4px}
</style>
</head>
<body>

<div id="signin">
  <div class="sicard">
    <h1><b>JMB</b> PRODUCTIVITY</h1>
    <p>Team leads only. Sign in with your Employee ID and PIN.</p>
    <input class="inp" id="si-id" placeholder="Employee ID" autocomplete="off">
    <input class="inp" id="si-pin" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off">
    <button class="btn" style="width:100%" id="si-btn" onclick="signIn()">Sign in</button>
    <div class="err" id="si-err"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <span class="logo"><b>JMB</b> PRODUCTIVITY HUB</span>
    <span class="spacer"></span>
    <span class="who">Hi, <b id="who-name">—</b></span>
    <button class="btn ghost sm" onclick="openReview()" style="border-color:rgba(52,211,153,.4);color:#34d399;">✔ Review volumes</button>
    <button class="btn ghost sm" onclick="load()">↻ Refresh</button>
    <button class="btn ghost sm" onclick="signOut()">Sign out</button>
  </header>
  <main>
    <div class="controls">
      <button class="btn ghost sm" id="p-cut" onclick="presetCutoff()">This cutoff</button>
      <button class="btn ghost sm" id="p-prev" onclick="presetPrevCutoff()">Prev cutoff</button>
      <button class="btn ghost sm" id="p-month" onclick="presetMonth()">This month</button>
      <label>From<input type="date" id="d-from" onchange="load()"></label>
      <label>To<input type="date" id="d-to" onchange="load()"></label>
    </div>
    <div class="stats" id="stats"></div>
    <div class="legend"><span><i style="background:#fff;opacity:.6"></i>Team average (QPH)</span><span><i style="background:var(--green)"></i>Above average</span><span><i style="background:var(--red)"></i>Below average</span></div>
    <div id="results"><div class="empty">Loading…</div></div>
  </main>
</div>

<!-- VOLUME REVIEW MODAL -->
<div id="rev-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:120;padding:20px;overflow:auto;">
  <div style="max-width:1040px;margin:24px auto;background:#0f1520;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:20px 22px;">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px;">
      <div style="font-size:16px;font-weight:800;">Volume review</div>
      <span class="spacer" style="flex:1"></span>
      <span id="rev-counts" style="font-size:12px;color:#9fb0c3;"></span>
      <button class="btn ghost sm" onclick="closeReview()">✕ Close</button>
    </div>
    <div style="font-size:12px;color:#9fb0c3;margin-bottom:12px;">Only <b style="color:#34d399">approved</b> volumes count toward QPH. Uses the date range set on the dashboard.</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
      <label style="font-size:12px;color:#9fb0c3;">Show
        <select id="rev-status" onchange="loadReview()" style="background:#1a2330;border:1px solid rgba(255,255,255,.14);border-radius:8px;color:#e6edf3;padding:6px 9px;font-family:inherit;">
          <option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option><option value="all">All</option>
        </select>
      </label>
      <button class="btn ghost sm" onclick="loadReview()">↻ Refresh</button>
      <span class="spacer" style="flex:1"></span>
      <button class="btn ghost sm" onclick="revApproveAll()" style="border-color:rgba(52,211,153,.4);color:#34d399;">✔ Approve all shown (as logged)</button>
      <button class="btn ghost sm" onclick="revResetAllShown()" style="border-color:rgba(148,163,184,.45);color:#94a3b8;">↩ Reset all shown → Pending</button>
    </div>
    <div id="rev-body"><div class="empty">Loading…</div></div>
  </div>
</div>

<script>
var PORTAL_URL = "https://script.google.com/macros/s/AKfycbxbOUn-0xO4r8H4bw4nA7YMfVb0yByOLL4TuRPKvtPh2rjY-b3rOJ5aBoIc8sOmO9kP/exec";
var ADMIN_PASS = "JMBeast_020298";   // lets an admin sign in with ID "ADMIN" + this password
var USER=null;
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function clRank(d){var s=String((d&&(d.career_level||d.cl||d.level))||'');var n=parseInt(s.replace(/[^0-9]/g,''),10);return isNaN(n)?0:n;}

/* ---- date helpers (cutoff 1–15 / 16–end) ---- */
function fmt(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function cutoff(d){var y=d.getFullYear(),m=d.getMonth(),day=d.getDate();
  return day<=15?{from:new Date(y,m,1),to:new Date(y,m,15)}:{from:new Date(y,m,16),to:new Date(y,m+1,0)};}
function presetCutoff(){var c=cutoff(new Date());$('d-from').value=fmt(c.from);$('d-to').value=fmt(c.to);mark('p-cut');load();}
function presetPrevCutoff(){var c=cutoff(new Date());var prevEnd=new Date(c.from);prevEnd.setDate(prevEnd.getDate()-1);var c2=cutoff(prevEnd);$('d-from').value=fmt(c2.from);$('d-to').value=fmt(c2.to);mark('p-prev');load();}
function presetMonth(){var d=new Date();$('d-from').value=fmt(new Date(d.getFullYear(),d.getMonth(),1));$('d-to').value=fmt(new Date(d.getFullYear(),d.getMonth()+1,0));mark('p-month');load();}
function mark(id){['p-cut','p-prev','p-month'].forEach(function(x){$(x).classList.toggle('on',x===id);});}

/* ---- sign in ---- */
async function signIn(){
  var id=($('si-id').value||'').trim(), pin=($('si-pin').value||'').trim();
  var err=$('si-err'); err.style.display='none';
  if(!id||!pin){ err.style.display='block'; err.textContent='Enter your Employee ID and PIN.'; return; }
  // Admin sign-in: ID "ADMIN" + admin password (no employee record needed).
  if(id.toUpperCase()==='ADMIN'){
    if(pin===ADMIN_PASS){ USER={ id:'ADMIN', name:'Admin' }; try{ sessionStorage.setItem('prod_user', JSON.stringify(USER)); }catch(e){} startApp(); }
    else { err.style.display='block'; err.textContent='Incorrect admin password.'; }
    return;
  }
  var b=$('si-btn'); b.disabled=true; b.textContent='Checking…';
  try{
    var r=await fetch(PORTAL_URL+'?id='+encodeURIComponent(id)+'&pin='+encodeURIComponent(pin)+'&_='+Date.now());
    var d=await r.json();
    b.disabled=false; b.textContent='Sign in';
    if(!d || d.error){ err.style.display='block'; err.textContent=(d&&d.error==='WRONG_PIN')?'Incorrect PIN.':'Employee not found.'; return; }
    var rank=clRank(d), isAdmin=String(d.employee_id||'').toUpperCase()==='ADMIN';
    if(!(isAdmin || rank===7 || rank===8 || rank===9)){ err.style.display='block'; err.textContent='Access is limited to team leads (CL7–CL9).'; return; }
    USER={ id:d.employee_id, name:d.full_name||d.employee_id };
    try{ sessionStorage.setItem('prod_user', JSON.stringify(USER)); }catch(e){}
    startApp();
  }catch(e){ b.disabled=false; b.textContent='Sign in'; err.style.display='block'; err.textContent='Network error — try again.'; }
}
function signOut(){ try{ sessionStorage.removeItem('prod_user'); }catch(e){} location.reload(); }
function startApp(){
  $('signin').style.display='none'; $('app').style.display='block';
  $('who-name').textContent=USER.name;
  presetCutoff();   // sets dates + loads
}

/* ---- load + render ---- */
async function load(){
  var from=$('d-from').value, to=$('d-to').value;
  if(!from||!to) return;
  $('results').innerHTML='<div class="empty">Loading…</div>';
  try{
    var r=await fetch(PORTAL_URL+'?action=productivity&scope=all&from='+encodeURIComponent(from)+'&to='+encodeURIComponent(to)+'&_='+Date.now());
    var d=await r.json();
    if(!d||!d.ok){ $('results').innerHTML='<div class="empty">Could not load productivity data.</div>'; return; }
    render(d);
  }catch(e){ $('results').innerHTML='<div class="empty" style="color:var(--red)">Network error.</div>'; }
}
function render(d){
  var team=d.team||[], rows=d.rows||[];
  // stats
  var users={}; rows.forEach(function(x){ users[x.employee_id]=1; });
  var totVol=team.reduce(function(s,t){return s+t.volume;},0), totHrs=team.reduce(function(s,t){return s+t.hours;},0);
  $('stats').innerHTML=[
    ['Tasks measured', team.length],
    ['Active people', Object.keys(users).length],
    ['Total output', Math.round(totVol).toLocaleString()],
    ['Total hours', (Math.round(totHrs*10)/10).toLocaleString()],
    ['Team QPH', totHrs>0?(Math.round(totVol/totHrs*100)/100):0]
  ].map(function(s){return '<div class="stat"><div class="v">'+s[1]+'</div><div class="l">'+s[0]+'</div></div>';}).join('');
  if(!team.length){ $('results').innerHTML='<div class="empty">No output recorded in this range. QPH needs tasks that have both volume and hours.</div>'; return; }
  // per-task cards
  $('results').innerHTML=team.map(function(t){
    var us=rows.filter(function(x){return x.task===t.task;}).slice().sort(function(a,b){return b.qph-a.qph;});
    var maxQ=Math.max.apply(null,[t.qph].concat(us.map(function(u){return u.qph;})));
    var benchPct=maxQ>0?(t.qph/maxQ*100):0;
    var list=us.map(function(u,i){
      var pct=maxQ>0?(u.qph/maxQ*100):0;
      var delta=t.qph>0?Math.round((u.qph-t.qph)/t.qph*100):0;
      var above=u.qph>=t.qph;
      var dCls=above?'up':'down', dTxt=(delta>0?'+':'')+delta+'%';
      return '<div class="urow'+(i===0?' top':'')+'">'+
        '<div class="urank">'+(i+1)+'</div>'+
        '<div><div class="uname">'+esc(u.full_name)+' <span class="usub">'+Math.round(u.volume).toLocaleString()+' / '+(Math.round(u.hours*10)/10)+'h</span></div>'+
          '<div class="ubarwrap"><div class="ubar"><span style="width:'+pct.toFixed(0)+'%;background:'+(above?'linear-gradient(90deg,#34d399,#059669)':'linear-gradient(90deg,#fb923c,#e83d00)')+'"></span><div class="benchline" style="left:'+benchPct.toFixed(0)+'%"></div></div></div>'+
        '</div>'+
        '<div class="uqph">'+u.qph+'<span class="udelta '+dCls+'">'+dTxt+'</span></div>'+
      '</div>';
    }).join('');
    return '<div class="tcard"><div class="th"><div class="tn">'+esc(t.task)+'</div>'+
      '<div class="tb">Team avg <b>'+t.qph+'</b> /hr · '+t.users+' people · '+Math.round(t.volume).toLocaleString()+' output / '+(Math.round(t.hours*10)/10)+'h</div></div>'+
      list+'</div>';
  }).join('');
}

/* ---- volume review (leads approve/reject/edit before it counts in QPH) ---- */
var REV=[];
function openReview(){ $('rev-modal').style.display='block'; loadReview(); }
function closeReview(){ $('rev-modal').style.display='none'; load(); }
async function loadReview(){
  var from=$('d-from').value, to=$('d-to').value, status=$('rev-status').value;
  var box=$('rev-body'); box.innerHTML='<div class="empty">Loading…</div>';
  try{
    var r=await fetch(PORTAL_URL+'?action=vol_review&from='+encodeURIComponent(from)+'&to='+encodeURIComponent(to)+'&status='+encodeURIComponent(status)+'&_='+Date.now());
    var d=await r.json();
    if(!d||!d.ok){
      // If vol_review isn't a known action, the old backend falls through to login and returns an employee/NOT_FOUND shape.
      var stale=(!d)||(d.error==='NOT_FOUND')||(d.error==='MISSING_PARAMS')||(d.error==='WRONG_PIN')||(d.error==='BAD_SHEET_HEADERS')||(d.employee_id!==undefined)||(d.error===undefined);
      box.innerHTML='<div class="empty" style="color:#f87171">Could not load entries'+((d&&d.error)?(' ('+esc(d.error)+')'):'')+'.'+
        (stale?'<br><span style="color:#9fb0c3">The portal Apps Script needs a NEW deployment — this build doesn\'t have the review endpoint yet. After deploying, ?action=ping should read <b>2026-07-01-vol-approval</b>.</span>':'')+'</div>';
      return; }
    REV=d.rows||[]; var c=d.counts||{};
    $('rev-counts').textContent=(c.pending||0)+' pending · '+(c.approved||0)+' approved · '+(c.rejected||0)+' rejected';
    renderReview();
  }catch(e){ box.innerHTML='<div class="empty" style="color:var(--red)">Network error.</div>'; }
}
function renderReview(){
  var box=$('rev-body');
  if(!REV.length){ box.innerHTML='<div class="empty">No entries for this filter.</div>'; return; }
  // group rows by project (preserve first-seen order); falls back to one group if backend hasn't sent project yet
  var order=[], byP={};
  REV.forEach(function(x,i){ var p=(x.project&&String(x.project).trim())||'(Ungrouped)'; if(!byP[p]){ byP[p]=[]; order.push(p); } byP[p].push(i); });

  var toolbar='<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;">'+
    '<button class="btn ghost sm" id="rev-appsel" onclick="revApproveSelected()" style="border-color:rgba(52,211,153,.5);color:#34d399;font-weight:700;padding:7px 14px;">✔ Approve selected (0)</button>'+
    '<span style="font-size:11px;color:#6b7d90;">Tick individual rows or a whole project, then approve in one click.</span></div>';

  var html='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px;">'+
    '<thead><tr style="text-align:left;color:#9fb0c3;font-size:11px;text-transform:uppercase;letter-spacing:.04em;">'+
    '<th style="padding:8px 6px;width:26px;"><input type="checkbox" id="rev-all" onchange="revToggleAll(this.checked)" title="Select all"></th>'+
    '<th style="padding:8px 6px;">Employee</th><th style="padding:8px 6px;">Date</th><th style="padding:8px 6px;">Task</th><th style="padding:8px 6px;">Hours</th><th style="padding:8px 6px;">Volume</th><th style="padding:8px 6px;">Status</th><th style="padding:8px 6px;">Action</th></tr></thead><tbody>';

  order.forEach(function(p){
    var idxs=byP[p];
    var pend=idxs.filter(function(i){ return REV[i].ids && REV[i].vol_status!=='approved'; }).length;
    var pid='p'+p.replace(/[^a-z0-9]/gi,'_');
    html+='<tr style="background:rgba(124,160,255,.08);"><td colspan="8" style="padding:9px 8px;">'+
      '<label style="display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-weight:800;color:#e6edf3;font-size:12.5px;letter-spacing:.02em;">'+
      '<input type="checkbox" class="rev-pcb" data-proj="'+pid+'" onchange="revToggleProj(\''+pid+'\',this.checked)"'+(pend?'':' disabled')+'>'+
      '📁 '+esc(p)+' <span style="font-weight:500;color:#8aa0b6;font-size:11px;">'+idxs.length+' task-day'+(idxs.length>1?'s':'')+' · '+pend+' pending</span></label></td></tr>';
    idxs.forEach(function(i){
      var x=REV[i];
      var col={pending:'#fbbf24',approved:'#34d399',rejected:'#f87171'}[x.vol_status]||'#fbbf24';
      var noId=!x.ids; var selectable=!!(x.ids && x.vol_status!=='approved');
      var vol=(x.volume===''||x.volume==null)?0:Number(x.volume);
      var qph=(vol>0 && x.hours>0)?(vol/x.hours):0;
      var susp=(x.hours>0 && x.hours<0.1) || qph>500;
      var warn=susp?' <span title="Suspicious: very low hours / extreme rate" style="color:#fbbf24;font-weight:700;">⚠</span>':'';
      var cnt=(x.entries>1)?(' <span title="'+x.entries+' entries combined" style="color:#6b7d90;font-size:11px;">×'+x.entries+'</span>'):'';
      html+='<tr style="border-top:1px solid rgba(255,255,255,.07);'+(susp?'background:rgba(251,191,36,.07);':'')+'">'+
        '<td style="padding:8px 6px;"><input type="checkbox" class="rev-cb" data-i="'+i+'" data-proj="'+pid+'" onchange="revCbChange()"'+(selectable?'':' disabled')+'></td>'+
        '<td style="padding:8px 6px;">'+esc(x.full_name)+'</td>'+
        '<td style="padding:8px 6px;white-space:nowrap;">'+esc(x.date)+'</td>'+
        '<td style="padding:8px 6px;">'+esc(x.task||'—')+cnt+'</td>'+
        '<td style="padding:8px 6px;white-space:nowrap;'+(susp?'color:#fbbf24;':'')+'">'+(Math.round(x.hours*100)/100)+'h'+warn+'</td>'+
        '<td style="padding:8px 6px;"><input id="rv-'+i+'" type="number" step="any" value="'+(x.volume===''?'':x.volume)+'" placeholder="—" style="width:82px;background:#1a2330;border:1px solid rgba(255,255,255,.14);border-radius:7px;color:#e6edf3;padding:5px 7px;font-family:inherit;"'+(noId?' disabled':'')+'></td>'+
        '<td style="padding:8px 6px;color:'+col+';font-weight:700;text-transform:capitalize;">'+x.vol_status+(x.vol_by?('<div style="font-size:10px;color:#6b7d90;font-weight:400;">'+esc(x.vol_by)+'</div>'):'')+'</td>'+
        '<td style="padding:8px 6px;white-space:nowrap;">'+(noId?'<span style="color:#6b7d90;font-size:11px;">no id</span>':(
          '<button class="btn ghost sm" style="border-color:rgba(52,211,153,.4);color:#34d399;padding:5px 10px;" onclick="revAct('+i+',\'approved\')">Approve</button> '+
          '<button class="btn ghost sm" style="border-color:rgba(248,113,113,.4);color:#f87171;padding:5px 10px;" onclick="revAct('+i+',\'rejected\')">Reject</button>'+
          (x.vol_status!=='pending'?' <button class="btn ghost sm" style="border-color:rgba(148,163,184,.5);color:#94a3b8;padding:5px 10px;" onclick="revAct('+i+',\'pending\')" title="Undo — set back to pending">↩ Undo</button>':'')))+'</td>'+
      '</tr>';
    });
  });
  box.innerHTML=toolbar+html+'</tbody></table></div>';
  revCbChange();
}
function revCbChange(){
  var n=document.querySelectorAll('.rev-cb:checked').length;
  var b=$('rev-appsel'); if(b){ b.textContent='✔ Approve selected ('+n+')'; b.disabled=(n===0); b.style.opacity=n?'1':'.5'; }
  document.querySelectorAll('.rev-pcb').forEach(function(pc){
    var pid=pc.getAttribute('data-proj');
    var boxes=document.querySelectorAll('.rev-cb[data-proj="'+pid+'"]:not([disabled])');
    var chk=document.querySelectorAll('.rev-cb[data-proj="'+pid+'"]:checked');
    pc.checked = boxes.length>0 && chk.length===boxes.length;
  });
  var all=$('rev-all'); if(all){ var tot=document.querySelectorAll('.rev-cb:not([disabled])').length; all.checked=tot>0 && n===tot; }
}
function revToggleProj(pid, on){
  document.querySelectorAll('.rev-cb[data-proj="'+pid+'"]:not([disabled])').forEach(function(cb){ cb.checked=on; });
  revCbChange();
}
function revToggleAll(on){
  document.querySelectorAll('.rev-cb:not([disabled])').forEach(function(cb){ cb.checked=on; });
  revCbChange();
}
async function revApproveSelected(){
  var ids=[]; document.querySelectorAll('.rev-cb:checked').forEach(function(cb){ var x=REV[+cb.getAttribute('data-i')]; if(x&&x.ids&&x.vol_status!=='approved') ids.push(x.ids); });
  if(!ids.length){ alert('Tick at least one row (or a project) to approve.'); return; }
  if(!confirm('Approve '+ids.length+' selected task-day(s) as logged?')) return;
  var url=PORTAL_URL+'?action=set_vol_status&ids='+encodeURIComponent(ids.join(','))+'&status=approved&by_id='+encodeURIComponent(USER.id)+'&by_name='+encodeURIComponent(USER.name)+'&_='+Date.now();
  try{ var r=await fetch(url); var d=await r.json();
    if(d&&d.ok) loadReview();
    else alert('Failed: '+((d&&d.error==='NOT_LEAD')?'not authorized (leads only)':((d&&d.error)||'error')));
  }catch(e){ alert('Network error.'); }
}
async function revAct(i, status){
  var x=REV[i]; if(!x||!x.ids) return;
  var vEl=$('rv-'+i); var vol=vEl?vEl.value:'';
  var url=PORTAL_URL+'?action=set_vol_status&ids='+encodeURIComponent(x.ids)+'&status='+status+'&by_id='+encodeURIComponent(USER.id)+'&by_name='+encodeURIComponent(USER.name)+(vol!==''?('&volume='+encodeURIComponent(vol)):'')+'&_='+Date.now();
  try{ var r=await fetch(url); var d=await r.json();
    if(d&&d.ok) loadReview();
    else alert('Failed: '+((d&&d.error==='NOT_LEAD')?'not authorized (leads only)':((d&&d.error)||'error')));
  }catch(e){ alert('Network error.'); }
}
async function revApproveAll(){
  var ids=REV.filter(function(x){ return x.ids && x.vol_status!=='approved'; }).map(function(x){ return x.ids; }).join(',');
  var groups=REV.filter(function(x){ return x.ids && x.vol_status!=='approved'; }).length;
  if(!ids){ alert('Nothing to approve in this view.'); return; }
  if(!confirm('Approve all '+groups+' shown VA/task days as logged (no volume edits)?')) return;
  var url=PORTAL_URL+'?action=set_vol_status&ids='+encodeURIComponent(ids)+'&status=approved&by_id='+encodeURIComponent(USER.id)+'&by_name='+encodeURIComponent(USER.name)+'&_='+Date.now();
  try{ var r=await fetch(url); var d=await r.json();
    if(d&&d.ok) loadReview();
    else alert('Failed: '+((d&&d.error)||'error'));
  }catch(e){ alert('Network error.'); }
}
// Undo: set every shown entry that isn't already pending back to PENDING (reverses an
// accidental "approve/reject all"). Only affects the current date range + status filter.
async function revResetAllShown(){
  var ids=REV.filter(function(x){ return x.ids && x.vol_status!=='pending'; }).map(function(x){ return x.ids; }).join(',');
  var groups=REV.filter(function(x){ return x.ids && x.vol_status!=='pending'; }).length;
  if(!ids){ alert('Nothing to reset — everything shown is already pending.'); return; }
  if(!confirm('Reset all '+groups+' shown task-day(s) back to PENDING?\n\nThis undoes the approval/rejection for everything in the current date range so it can be reviewed again.')) return;
  var url=PORTAL_URL+'?action=set_vol_status&ids='+encodeURIComponent(ids)+'&status=pending&by_id='+encodeURIComponent(USER.id)+'&by_name='+encodeURIComponent(USER.name)+'&_='+Date.now();
  try{ var r=await fetch(url); var d=await r.json();
    if(d&&d.ok){ loadReview(); }
    else alert('Failed: '+((d&&d.error==='NOT_LEAD')?'not authorized (leads only)':((d&&d.error)||'error')));
  }catch(e){ alert('Network error.'); }
}
/* ---- boot ---- */
(function(){ var u=null; try{ u=JSON.parse(sessionStorage.getItem('prod_user')||'null'); }catch(e){}
  if(u&&u.id){ USER=u; startApp(); } else { $('si-id').focus();
    $('si-pin').addEventListener('keydown',function(e){ if(e.key==='Enter') signIn(); }); }
})();
</script>
