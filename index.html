<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>JMB Virtuals — Internal Hub</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%2276%2082%20360%20360%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22m%22%20x1%3D%220%22%20y1%3D%22.05%22%20x2%3D%220%22%20y2%3D%22.95%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%23FFE0BE%22%2F%3E%3Cstop%20offset%3D%22.46%22%20stop-color%3D%22%23FF7A29%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23C3380A%22%2F%3E%3C%2FlinearGradient%3E%3ClinearGradient%20id%3D%22b%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%220%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%23FF8E45%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23A52E08%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20x%3D%22241%22%20y%3D%22110%22%20width%3D%2230%22%20height%3D%22304%22%20rx%3D%2215%22%20fill%3D%22url%28%23m%29%22%2F%3E%3Cpath%20d%3D%22M256%20226Q341%20264%20398%20320Q341%20376%20256%20414Q171%20376%20114%20320Q171%20264%20256%20226Z%22%20fill%3D%22none%22%20stroke%3D%22url%28%23b%29%22%20stroke-width%3D%2250%22%20stroke-linejoin%3D%22round%22%20stroke-linecap%3D%22round%22%2F%3E%3Cpath%20d%3D%22M256%20110Q341%20148%20398%20204Q341%20260%20256%20298Q171%20260%20114%20204Q171%20148%20256%20110Z%22%20fill%3D%22none%22%20stroke%3D%22url%28%23m%29%22%20stroke-width%3D%2250%22%20stroke-linejoin%3D%22round%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f7f9; --bg2:#ffffff; --card:#ffffff; --card2:#f3f5f8;
  --line:rgba(17,24,39,.10); --line-hi:rgba(255,107,26,.45);
  --o1:#ff6b1a; --o2:#e84e00; --o3:#c2410c;
  --t1:#0f172a; --t2:#475569; --t3:#94a3b8;
  --r:16px; --rs:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;color:var(--t1);min-height:100vh;background:var(--bg);-webkit-font-smoothing:antialiased}

/* ── BACKGROUND ── */
#bg{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden}
#bg .grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(17,24,39,.032) 1px,transparent 1px),linear-gradient(90deg,rgba(17,24,39,.032) 1px,transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(ellipse 80% 64% at 50% -4%,rgba(255,107,26,.10) 0%,transparent 78%);mask-image:radial-gradient(ellipse 80% 64% at 50% -4%,rgba(255,107,26,.10) 0%,transparent 78%)}
#bg .orb{position:absolute;border-radius:50%;filter:blur(78px)}
#bg .o1{width:520px;height:520px;top:-180px;right:-130px;background:radial-gradient(circle,rgba(255,107,26,.16),transparent 68%)}
#bg .o2{width:440px;height:440px;bottom:-200px;left:-150px;background:radial-gradient(circle,rgba(255,107,26,.10),transparent 70%)}
#bg .o3{width:340px;height:340px;top:42%;left:54%;background:radial-gradient(circle,rgba(59,130,246,.10),transparent 70%)}

/* ── LOGIN ── */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.lbox{width:100%;max-width:400px;background:#ffffff;border:1px solid var(--line);
  border-radius:20px;padding:2.4rem 2.2rem;backdrop-filter:blur(16px) saturate(150%);
  box-shadow:0 24px 70px rgba(17,24,39,.14),inset 0 1px 0 rgba(17,24,39,.06)}
.llogo{display:flex;align-items:center;gap:12px;margin-bottom:1.6rem}
.llogo img{width:44px;height:44px;filter:drop-shadow(0 0 10px rgba(255,107,26,.4))}
.lbrand{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:.02em}
.lbrand small{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--o3);font-weight:400}
.lh{font-size:19px;font-weight:700;margin-bottom:4px}
.lsub{font-size:13px;color:var(--t2);margin-bottom:1.6rem}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:7px;font-weight:600}
.inp{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rs);color:var(--t1);
  font-size:15px;padding:12px 14px;outline:none;font-family:inherit;transition:border-color .2s}
.inp:focus{border-color:var(--o1)}
.pinwrap{position:relative}.pinwrap .inp{padding-right:44px}
.peye{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:none;background:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px}
.peye:hover{color:var(--o1);background:rgba(255,107,26,.1)}
.btn{width:100%;border:none;border-radius:var(--rs);padding:13px;font-family:inherit;font-size:14px;font-weight:600;color:#fff;
  background:linear-gradient(135deg,var(--o1),var(--o2));cursor:pointer;margin-top:.5rem;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,78,0,.4)}
.btn:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none}
.lerr{color:#f87171;font-size:13px;margin-top:.9rem;display:none;text-align:center}

/* ── APP ── */
#app{display:none}
header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:0 max(5%,1.4rem);height:66px;background:rgba(255,255,255,.72);backdrop-filter:blur(16px) saturate(150%);border-bottom:1px solid var(--line)}
.hl{display:flex;align-items:center;gap:11px}
.hl img{width:34px;height:34px;filter:drop-shadow(0 0 8px rgba(255,107,26,.4))}
.hl b{font-family:'Rajdhani',sans-serif;font-size:19px;letter-spacing:.02em}
.hl .pill{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;background:rgba(255,107,26,.14);color:var(--o3);border:1px solid rgba(255,107,26,.25);border-radius:20px;padding:3px 9px}
.hr{display:flex;align-items:center;gap:14px}
.hr .who{font-size:13px;color:var(--t2)}
.hr .who b{color:var(--t1);font-weight:600}
.bout{font-size:12px;font-weight:600;color:var(--t2);background:none;border:1px solid var(--line);border-radius:9px;padding:8px 14px;cursor:pointer;font-family:inherit}
.bout:hover{color:var(--t1);border-color:var(--line-hi)}

.wrap{max-width:1120px;margin:0 auto;padding:2rem max(5%,1.4rem) 4rem}
.hero{margin-bottom:2rem}
.hero h1{font-family:'Rajdhani',sans-serif;font-size:clamp(26px,4vw,40px);font-weight:700;line-height:1.05;margin-bottom:6px}
.hero h1 span{color:var(--o1)}
.hero p{color:var(--t2);font-size:15px}
.clock{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t3);margin-top:8px}

.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--o1);
  display:inline-flex;align-items:center;gap:8px;margin:2.2rem 0 1rem}
.eyebrow::before{content:'';width:20px;height:1.5px;background:var(--o1)}

.links{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.link{display:flex;align-items:center;gap:14px;background:#ffffff;-webkit-backdrop-filter:blur(10px) saturate(140%);backdrop-filter:blur(10px) saturate(140%);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 18px;text-decoration:none;color:var(--t1);transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden}
.link::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,107,26,.05),transparent 60%);pointer-events:none}
.link:hover{transform:translateY(-3px);border-color:var(--line-hi);box-shadow:0 14px 36px rgba(17,24,39,.10)}
.link .ic{width:44px;height:44px;flex-shrink:0;border-radius:11px;background:rgba(255,107,26,.12);color:var(--o1);display:flex;align-items:center;justify-content:center}
.link .ic svg{width:22px;height:22px}
.link .tx b{display:block;font-size:15px;font-weight:600}
.link .tx span{font-size:12.5px;color:var(--t3)}
.link .go{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--t3);opacity:0;transition:opacity .2s,transform .2s}
.link:hover .go{opacity:1;transform:translateY(-50%) translateX(2px)}
.link .badge{position:absolute;top:11px;right:13px;font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:20px;font-weight:500}
.link .badge.tool{background:rgba(255,107,26,.14);color:var(--o3);border:1px solid rgba(255,107,26,.28)}
.link .badge.auto{background:rgba(59,130,246,.16);color:#7db1ff;border:1px solid rgba(59,130,246,.32)}
.link.ph2{opacity:.66;cursor:default}
.link.ph2:hover{transform:none;border-color:var(--line);box-shadow:none;border-style:dashed}
.link .setup{position:absolute;right:15px;bottom:11px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--t3)}

.cols{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:start}
.card{background:rgba(255,255,255,.6);-webkit-backdrop-filter:blur(12px) saturate(140%);backdrop-filter:blur(12px) saturate(140%);border:1px solid var(--line);border-radius:var(--r);padding:1.4rem 1.5rem;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.card h3{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:9px}
.card h3 svg{width:18px;height:18px;color:var(--o1)}
.ann{display:flex;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
.ann:last-child{border-bottom:none;padding-bottom:0}
.ann:first-child{padding-top:0}
.ann .dot{width:9px;height:9px;border-radius:50%;background:var(--o1);margin-top:5px;flex-shrink:0;box-shadow:0 0 0 4px rgba(255,107,26,.15)}
.ann .at{font-size:14px;font-weight:600;margin-bottom:2px}
.ann .ad{font-size:13px;color:var(--t2);line-height:1.55}
.ann .am{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--t3);margin-top:5px}
.res a{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);text-decoration:none;color:var(--t1);font-size:14px;transition:color .15s}
.res a:last-child{border-bottom:none}
.res a:hover{color:var(--o1)}
.res a svg{width:16px;height:16px;color:var(--t3);flex-shrink:0}
.res a:hover svg{color:var(--o1)}

.team{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:.2rem}
.tm{background:#ffffff;-webkit-backdrop-filter:blur(10px) saturate(140%);backdrop-filter:blur(10px) saturate(140%);border:1px solid var(--line);border-radius:var(--r);padding:18px 16px;text-align:center;transition:transform .2s,border-color .2s,box-shadow .2s}
.tm:hover{box-shadow:0 12px 32px rgba(0,0,0,.3)}
.tm:hover{transform:translateY(-3px);border-color:var(--line-hi)}
.tm .av{width:60px;height:60px;border-radius:50%;margin:0 auto 10px;object-fit:cover;border:2px solid rgba(255,107,26,.4);background:var(--card2)}
.tm .ph{width:60px;height:60px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;background:linear-gradient(135deg,#3b82f6,#2563eb);border:2px solid rgba(255,107,26,.4)}
.tm .nm{font-size:13.5px;font-weight:600;line-height:1.25}
.tm .ps{font-size:11.5px;color:var(--t3);margin-top:2px}
.tm .bd{display:inline-flex;align-items:center;gap:5px;margin-top:9px;padding:4px 9px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--t2);background:rgba(17,24,39,.04);border:1px solid var(--line)}
.tm .bd svg{width:12px;height:12px;color:var(--t3)}
.tm .bd .bage{color:var(--o3);font-weight:600;padding-left:7px;border-left:1px solid var(--line)}
.tm .bd.soon{color:var(--o3);background:rgba(255,107,26,.12);border-color:rgba(255,107,26,.3)}
.tm .bd.soon svg{color:var(--o3)}
.tm .bd.soon .bage{color:var(--o3);border-left-color:rgba(255,107,26,.35)}
.muted{color:var(--t3);font-size:13px;text-align:center;padding:1rem}

/* upcoming birthdays strip */
.bcard{background:linear-gradient(135deg,rgba(255,107,26,.14),rgba(255,107,26,.05));border:1px solid rgba(255,107,26,.3);border-radius:var(--r);padding:1.1rem 1.4rem;margin-bottom:.5rem}
.bhead{display:flex;align-items:center;gap:9px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;margin-bottom:.9rem}
.bhead svg{width:18px;height:18px;color:var(--o1)}
.blist{display:flex;gap:12px;flex-wrap:wrap}
.bitem{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:30px;padding:6px 14px 6px 6px}
.bitem .bav{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,107,26,.16);background:var(--card2)}
.bitem .bph{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,#3b82f6,#2563eb);border:1.5px solid rgba(255,107,26,.16)}
.bitem .bnm{font-size:13px;font-weight:600;line-height:1.2}
.bitem .bwhen{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--o3)}
.bitem.today{background:rgba(255,107,26,.2);border-color:var(--o1)}

/* ── SOP DOC READER ── */
#doc-modal{position:fixed;inset:0;z-index:200;display:none;background:linear-gradient(180deg,#fbfbfd 0%,#f3f5f8 100%);
  overflow-y:auto;padding:0}
#doc-modal.open{display:block;animation:docFade .22s ease}
@keyframes docFade{from{opacity:0}to{opacity:1}}
.docbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;
  padding:0 max(5%,1.4rem);height:62px;background:rgba(255,255,255,.86);backdrop-filter:blur(16px) saturate(150%);border-bottom:1px solid var(--line)}
.docback{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--t2);
  background:none;border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer;font-family:inherit;transition:.15s}
.docback:hover{color:var(--t1);border-color:var(--line-hi)}
.docback svg{width:15px;height:15px}
.docbar .dt{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:17px;letter-spacing:.01em}
.docwrap{max-width:820px;margin:0 auto;padding:2.4rem max(5%,1.4rem) 5rem}
.dochead{margin-bottom:1.8rem;padding-bottom:1.4rem;border-bottom:1px solid var(--line)}
.dochead .dic{width:50px;height:50px;border-radius:13px;background:rgba(255,107,26,.12);color:var(--o1);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.dochead .dic svg{width:26px;height:26px}
.dochead h1{font-family:'Rajdhani',sans-serif;font-size:clamp(26px,4vw,36px);font-weight:700;line-height:1.08;margin-bottom:8px}
.dochead .dmeta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.doc{color:var(--t1);font-size:15px;line-height:1.7}
.doc h2{font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;margin:2rem 0 .8rem;display:flex;align-items:center;gap:10px;color:var(--t1)}
.doc h2::before{content:'';width:5px;height:20px;border-radius:3px;background:linear-gradient(var(--o3),var(--o2));flex-shrink:0}
.doc h3{font-size:15.5px;font-weight:700;margin:1.4rem 0 .5rem;color:var(--o3)}
.doc p{margin:0 0 1rem;color:var(--t2)}
.doc ul,.doc ol{margin:0 0 1.1rem;padding-left:1.3rem;color:var(--t2)}
.doc li{margin-bottom:.5rem}
.doc li::marker{color:var(--o1)}
.doc strong{color:var(--t1);font-weight:600}
.doc a{color:var(--o3);text-decoration:none;border-bottom:1px solid rgba(255,154,92,.35)}
.doc a:hover{border-bottom-color:var(--o3)}
.doc code{font-family:'JetBrains Mono',monospace;font-size:13px;background:rgba(17,24,39,.06);border:1px solid var(--line);border-radius:6px;padding:1.5px 6px;color:var(--o3)}
.doc .lead{font-size:16px;color:var(--t1);line-height:1.65}
.callout{display:flex;gap:12px;background:rgba(255,107,26,.08);border:1px solid rgba(255,107,26,.25);border-left:3px solid var(--o1);
  border-radius:12px;padding:14px 16px;margin:1.2rem 0;font-size:14px;color:var(--t1);line-height:1.6}
.callout svg{width:18px;height:18px;color:var(--o1);flex-shrink:0;margin-top:2px}
.callout.warn{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.3);border-left-color:#f87171}
.callout.warn svg{color:#f87171}
.steps{counter-reset:s;list-style:none;padding-left:0}
.steps>li{position:relative;padding-left:42px;margin-bottom:1rem;min-height:30px}
.steps>li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:-2px;width:28px;height:28px;border-radius:9px;
  background:linear-gradient(135deg,var(--o1),var(--o2));color:#fff;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center}
.swatches{display:flex;flex-wrap:wrap;gap:12px;margin:1rem 0 1.4rem}
.sw{border:1px solid var(--line);border-radius:12px;overflow:hidden;width:128px;background:var(--card)}
.sw .chip{height:62px}
.sw .si{padding:9px 11px}
.sw .si b{display:block;font-size:13px;font-weight:600}
.sw .si span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3)}
.dtable{width:100%;border-collapse:collapse;margin:1rem 0 1.4rem;font-size:14px}
.dtable th,.dtable td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
.dtable th{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);font-weight:600}
.dtable td{color:var(--t2)}
.dtable td strong{color:var(--t1)}
.chk{list-style:none;padding-left:0}
.chk li{position:relative;padding-left:30px;margin-bottom:.6rem;color:var(--t2)}
.chk li::before{content:'';position:absolute;left:0;top:3px;width:18px;height:18px;border-radius:6px;border:1.5px solid var(--o1);background:rgba(255,107,26,.1)}
.chk li::after{content:'';position:absolute;left:6px;top:6px;width:6px;height:10px;border:solid var(--o1);border-width:0 2px 2px 0;transform:rotate(45deg)}
.sopindex{display:grid;grid-template-columns:1fr;gap:10px}
.sopindex button{display:flex;align-items:center;gap:13px;text-align:left;background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:12px;
  padding:13px 15px;cursor:pointer;font-family:inherit;color:var(--t1);transition:.18s;width:100%}
.sopindex button:hover{border-color:var(--line-hi);transform:translateX(3px)}
.sopindex .sn{width:34px;height:34px;border-radius:9px;background:rgba(255,107,26,.12);color:var(--o1);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;flex-shrink:0}
.sopindex .stx b{display:block;font-size:14.5px;font-weight:600}
.sopindex .stx span{font-size:12.5px;color:var(--t3)}
.res a{cursor:pointer}

@media(max-width:820px){ .cols{grid-template-columns:1fr} }
</style>
<style id="hub-premium">

/* ───────────── ONBOARDING ───────────── */
onboarding:{ title:'Onboarding guide', icon:IC.onboarding, updated:'Updated June 2026',
html:
'<p class="lead">Welcome to JMB Virtuals. This guide walks you through your first week — the accounts you need, the tools you\'ll use every day, and how we work. Read it once end-to-end, then keep it bookmarked.</p>'+
'<div class="callout">'+BULB+'<div>Your goal for week one: get fully set up, complete one full tracked workday, and know who to ask when you\'re stuck. Everything else you\'ll pick up as you go.</div></div>'+
'<h2>Day one checklist</h2>'+
'<ul class="chk">'+
'<li>Receive your <strong>Employee ID</strong> (e.g. <code>JMB0XX</code>) and <strong>PIN</strong> from your manager.</li>'+
'<li>Sign in to the <strong>Employee Portal</strong> at <a href="https://portal.jmbvirtuals.com" target="_blank" rel="noopener">portal.jmbvirtuals.com</a> and confirm your profile photo and details are correct.</li>'+
'<li>Sign in to this <strong>Internal Hub</strong> with the same ID and PIN.</li>'+
'<li>Confirm your <strong>shift</strong> (morning or night) and your weekly schedule with your manager.</li>'+
'<li>Join the <strong>team voice room</strong> and team chat so you can reach everyone.</li>'+
'<li>Read the <strong>Leave &amp; attendance policy</strong> and the <strong>Employee tools setup</strong> guide in Resources.</li>'+
'</ul>'+
'<h2>Accounts &amp; access</h2>'+
'<p>You only need two logins to get started, and both use the same credentials:</p>'+
'<table class="dtable"><thead><tr><th>What</th><th>Where</th><th>Login</th></tr></thead><tbody>'+
'<tr><td><strong>Employee Portal</strong></td><td>portal.jmbvirtuals.com</td><td>Employee ID + PIN</td></tr>'+
'<tr><td><strong>Internal Hub</strong></td><td>internals.jmbvirtuals.com</td><td>Employee ID + PIN</td></tr>'+
'</tbody></table>'+
'<p>If a login doesn\'t work, double-check your ID format and PIN, then message your manager. Never share your PIN with anyone.</p>'+
'<h2>Your first tracked day</h2>'+
'<ol class="steps">'+
'<li>Open the <strong>Employee Portal</strong> at the start of your shift — this records your attendance for the day.</li>'+
'<li>Pick your <strong>project</strong> and <strong>task</strong> from the dropdowns, then press <strong>Start</strong> on the time tracker.</li>'+
'<li>Use <strong>Pause</strong> whenever you step away, and the <strong>bio-break</strong> button for short breaks. Resume when you\'re back.</li>'+
'<li>At the end of your shift, press <strong>Stop</strong>. Your tracked hours feed your attendance and payslip automatically.</li>'+
'</ol>'+
'<div class="callout warn">'+WARN+'<div>The tracker auto-pauses if it detects no activity for a while, and repeated inactivity can trigger a demerit. If you\'re reading, on a call, or away from the keyboard, use <strong>Pause</strong> or <strong>bio-break</strong> so it\'s logged properly.</div></div>'+
'<h2>How we communicate</h2>'+
'<p>Stay reachable during your shift. Hop into the <strong>team voice room</strong> from the portal when you want to talk things through — you can join with just audio, or turn your camera on. Use the team chat for quick written updates and questions. When in doubt, over-communicate: a short "starting on X now" message keeps everyone aligned.</p>'+
'<h2>Where to get help</h2>'+
'<p>Start with the Resources on this hub — most answers live in the <a href="#" onclick="openDoc(\'sop\');return false;">SOP library</a>. For account or schedule issues, message your manager. For anything urgent during a shift, the team voice room is the fastest way to reach someone.</p>' },

/* ───────────── SOP LIBRARY ───────────── */
sop:{ title:'SOP library', icon:IC.sop, updated:'Updated June 2026',
html:
'<p class="lead">Standard operating procedures — the repeatable "how we do it" for the work that comes up most. Each one is short on purpose. Jump to the others from here:</p>'+
'<div class="sopindex">'+
'<button onclick="openDoc(\'onboarding\')"><span class="sn">01</span><span class="stx"><b>Onboarding</b><span>Your first week, accounts, and first tracked day</span></span></button>'+
'<button onclick="openDoc(\'tools\')"><span class="sn">02</span><span class="stx"><b>Employee tools setup</b><span>Portal, tracker, voice, security basics</span></span></button>'+
'<button onclick="openDoc(\'leave\')"><span class="sn">03</span><span class="stx"><b>Leave &amp; attendance policy</b><span>Shifts, scoring, lateness, requesting leave</span></span></button>'+
'<button onclick="openDoc(\'brand\')"><span class="sn">04</span><span class="stx"><b>Brand kit &amp; logos</b><span>Logo, colors, fonts, voice &amp; tone</span></span></button>'+
'</div>'+
'<h2>Daily start &amp; end routine</h2>'+
'<h3>Start of shift</h3>'+
'<ul><li>Open the Employee Portal to clock your attendance.</li><li>Check the Internal Hub announcements for anything new.</li><li>Select your project &amp; task and press <strong>Start</strong>.</li><li>Drop a quick "online" in team chat or the voice room.</li></ul>'+
'<h3>End of shift</h3>'+
'<ul><li>Wrap up your current task and note where you left off.</li><li>Press <strong>Stop</strong> on the tracker.</li><li>Send a short end-of-day summary to your manager or the team channel.</li></ul>'+
'<h2>Time tracking SOP</h2>'+
'<ul>'+
'<li><strong>One timer at a time.</strong> Switch tasks by stopping the current one and starting the next.</li>'+
'<li><strong>Pause for any real break</strong> — meals, errands, long calls. Use the <strong>bio-break</strong> button for short personal breaks.</li>'+
'<li><strong>Stay active.</strong> The tracker watches for inactivity and auto-pauses; repeated idle time can cost you a demerit.</li>'+
'<li><strong>One device.</strong> If you open the portal on a second device, only the active session tracks — so your phone and laptop won\'t fight each other.</li>'+
'</ul>'+
'<h2>Requesting leave or time off</h2>'+
'<ol class="steps"><li>Give as much notice as you can.</li><li>Message your manager with the dates and reason.</li><li>Wait for confirmation before treating it as approved.</li></ol>'+
'<p>Full rules — scoring, lateness, and how absences affect your record — are in the <a href="#" onclick="openDoc(\'leave\');return false;">Leave &amp; attendance policy</a>.</p>'+
'<h2>Reporting a problem</h2>'+
'<p>Found a bug, a broken link, or something that blocks your work? Note <strong>what you were doing</strong>, <strong>what happened</strong>, and a <strong>screenshot</strong> if you can, then send it to your manager or the team channel. Clear reports get fixed faster.</p>'+
'<h2>Client communication standards</h2>'+
'<ul><li>Reply promptly and professionally during your shift hours.</li><li>Keep messages clear, friendly, and free of jargon.</li><li>Confirm deadlines in writing, and flag risks early rather than at the last minute.</li><li>When unsure how to respond to a client, ask your manager before sending.</li></ul>' },

/* ───────────── BRAND KIT ───────────── */
brand:{ title:'Brand kit & logos', icon:IC.brand, updated:'Updated June 2026',
html:
'<p class="lead">The JMB Virtuals look in one place — logo, colors, type, and how we sound. Use these whenever you create anything that carries the company name.</p>'+
'<h2>Logo</h2>'+
'<p>Our mark is the layered orange diamond beside the <strong>JMB VIRTUALS</strong> wordmark. Keep clear space around it, don\'t stretch or recolor it, and don\'t place it on busy backgrounds where it loses contrast. On dark backgrounds use the standard mark; on light backgrounds make sure the wordmark stays legible.</p>'+
'<div class="callout">'+BULB+'<div>Need the logo files? Ask your manager for the brand asset folder — it has the SVG, PNG, and favicon set in light and dark versions.</div></div>'+
'<h2>Colors</h2>'+
'<p>Orange is our signature. Use it for accents, buttons, and highlights — not for large blocks of text. Dark navy is our base.</p>'+
'<div class="swatches">'+
'<div class="sw"><div class="chip" style="background:#ff6b1a"></div><div class="si"><b>Primary</b><span>#FF6B1A</span></div></div>'+
'<div class="sw"><div class="chip" style="background:#e84e00"></div><div class="si"><b>Deep</b><span>#E84E00</span></div></div>'+
'<div class="sw"><div class="chip" style="background:#ff9a5c"></div><div class="si"><b>Light</b><span>#FF9A5C</span></div></div>'+
'<div class="sw"><div class="chip" style="background:#f6f7f9"></div><div class="si"><b>Base</b><span>#f6f7f9</span></div></div>'+
'<div class="sw"><div class="chip" style="background:#ffffff"></div><div class="si"><b>Surface</b><span>#ffffff</span></div></div>'+
'<div class="sw"><div class="chip" style="background:#0f172a"></div><div class="si"><b>Text</b><span>#0f172a</span></div></div>'+
'</div>'+
'<h2>Typography</h2>'+
'<table class="dtable"><thead><tr><th>Use</th><th>Font</th><th>Notes</th></tr></thead><tbody>'+
'<tr><td><strong>Headlines</strong></td><td>Rajdhani</td><td>Bold, condensed — for titles and the brand name</td></tr>'+
'<tr><td><strong>Body</strong></td><td>Inter</td><td>Clean and readable — for paragraphs and UI</td></tr>'+
'<tr><td><strong>Labels / code</strong></td><td>JetBrains Mono</td><td>Small caps, timestamps, technical tags</td></tr>'+
'</tbody></table>'+
'<h2>Voice &amp; tone</h2>'+
'<p>We sound <strong>professional, warm, and clear</strong>. We\'re a reliable partner, not a faceless agency. Write like a helpful human: plain language, short sentences, no overselling. Confident but never pushy.</p>'+
'<h3>Do</h3>'+
'<ul><li>Lead with the client\'s benefit.</li><li>Be specific and concrete.</li><li>Keep it tidy and easy to scan.</li></ul>'+
'<h3>Avoid</h3>'+
'<ul><li>Jargon and buzzwords.</li><li>Over-promising or vague claims.</li><li>Recoloring or distorting the logo.</li></ul>' },

/* ───────────── LEAVE & ATTENDANCE ───────────── */
leave:{ title:'Leave & attendance policy', icon:IC.leave, updated:'Effective June 15, 2026',
html:
'<p class="lead">How attendance is tracked, scored, and what counts as present, late, or absent. Attendance tracking went live on <strong>June 15, 2026</strong> — days before that are not counted.</p>'+
'<h2>Shifts &amp; schedule</h2>'+
'<p>You work either the <strong>morning</strong> or <strong>night</strong> shift, confirmed with your manager. All times are <strong>Philippine Time (PHT)</strong>. Your <strong>expected days</strong> for the month are set by your manager and shown on your portal scorecard — that\'s what your attendance is measured against.</p>'+
'<h2>How attendance is scored</h2>'+
'<p>Your portal profile shows a monthly summary built from your time tracker, not from manual check-ins:</p>'+
'<table class="dtable"><thead><tr><th>Metric</th><th>What it means</th></tr></thead><tbody>'+
'<tr><td><strong>Present / Expected</strong></td><td>Days you tracked work vs. days you were scheduled</td></tr>'+
'<tr><td><strong>Total hours</strong></td><td>Regular + overtime, computed from tracked time</td></tr>'+
'<tr><td><strong>Overtime</strong></td><td>Morning shift after <strong>5:00 PM PHT</strong>; night shift after <strong>5:00 AM PHT</strong></td></tr>'+
'<tr><td><strong>Absent / Late</strong></td><td>Missed scheduled days and late starts</td></tr>'+
'</tbody></table>'+
'<h2>Staying "present"</h2>'+
'<p>A day counts as present when you\'ve genuinely tracked work for it. Because hours come from the tracker:</p>'+
'<ul><li>Clock in and start your timer at the beginning of your shift.</li><li>Use <strong>Pause</strong> and <strong>bio-break</strong> for breaks so idle time is logged, not penalized.</li><li>Press <strong>Stop</strong> at the end of your shift.</li></ul>'+
'<div class="callout warn">'+WARN+'<div><strong>Inactivity demerits:</strong> if the tracker detects you\'re idle without pausing, it auto-pauses and may issue a demerit. You\'ll hear a warning tone. Pausing properly avoids this entirely.</div></div>'+
'<h2>Bio-breaks</h2>'+
'<p>Use the <strong>bio-break</strong> button in the portal for short personal breaks. It logs the break cleanly so it doesn\'t read as inactivity. Keep them reasonable and get back promptly.</p>'+
'<h2>Requesting leave</h2>'+
'<ol class="steps">'+
'<li><strong>Notice.</strong> Give as much advance notice as possible — planned leave is far easier to approve.</li>'+
'<li><strong>Request.</strong> Message your manager with the exact dates and a short reason.</li>'+
'<li><strong>Confirmation.</strong> Don\'t consider leave approved until your manager confirms it.</li>'+
'</ol>'+
'<p>Approved leave days won\'t count against your attendance. Unplanned absences without notice may be recorded as absent.</p>' },

tools:{ title:'Employee tools setup', icon:IC.tools, updated:'Updated June 2026',
html:
'<p class="lead">Everything you need running on day one. Set these up once and you\'re ready for every shift.</p>'+
'<h2>1 · Employee Portal</h2>'+
'<p>Your daily home base at <a href="https://portal.jmbvirtuals.com" target="_blank" rel="noopener">portal.jmbvirtuals.com</a>. Sign in with your Employee ID and PIN. From here you:</p>'+
'<ul><li>Clock attendance and run the <strong>time tracker</strong> (projects, tasks, pause/resume).</li><li>Take <strong>bio-breaks</strong>.</li><li>View your <strong>scorecard</strong>, hours, and <strong>payslip</strong>.</li><li>Join the <strong>team voice room</strong> and chat.</li></ul>'+
'<div class="callout">'+BULB+'<div>Add the portal to your home screen or bookmarks bar so it\'s one tap away at the start of every shift.</div></div>'+
'<h2>2 · Time tracker</h2>'+
'<ol class="steps"><li>Pick your <strong>project</strong> and <strong>task</strong>.</li><li>Press <strong>Start</strong> to begin, <strong>Pause</strong> when stepping away, <strong>Resume</strong> when back.</li><li>Press <strong>Stop</strong> at the end of your shift.</li></ol>'+
'<p>Tracked time drives your hours, attendance, and pay — so keep it accurate. Only the <strong>active session</strong> tracks, so opening the portal on a second device won\'t cause false inactivity.</p>'+
'<h2>3 · Team voice &amp; chat</h2>'+
'<p>Open the <strong>voice room</strong> from the portal to talk with the team while you work. You can join audio-only or turn your <strong>camera</strong> on. Your mic state shows on your bubble — a badge when muted, a speaking indicator when you talk. Mute when you\'re not speaking to keep the room clean.</p>'+
'<h2>4 · Internal Hub</h2>'+
'<p>This site — <a href="https://internals.jmbvirtuals.com" target="_blank" rel="noopener">internals.jmbvirtuals.com</a>. Your quick links, announcements, these resources, team directory, and upcoming birthdays. Same login as the portal.</p>'+
'<h2>What you need on your end</h2>'+
'<table class="dtable"><thead><tr><th>Requirement</th><th>Why</th></tr></thead><tbody>'+
'<tr><td><strong>Stable internet</strong></td><td>Reliable connection for tracking and voice</td></tr>'+
'<tr><td><strong>Updated browser</strong></td><td>Chrome or Edge recommended for voice/camera</td></tr>'+
'<tr><td><strong>Working mic</strong> (camera optional)</td><td>Team voice room</td></tr>'+
'<tr><td><strong>Quiet workspace</strong></td><td>Clear calls and focused work</td></tr>'+
'</tbody></table>'+
'<h2>Security basics</h2>'+
'<ul>'+
'<li><strong>Never share your PIN.</strong> It\'s yours alone — treat it like a password.</li>'+
'<li><strong>Lock your device</strong> when you step away.</li>'+
'<li><strong>Sign out</strong> on shared or public computers.</li>'+
'<li><strong>Handle client data carefully</strong> — only access what you need, and never store it where it shouldn\'t be.</li>'+
'<li><strong>Report anything suspicious</strong> — odd login prompts, strange links, or access issues — to your manager right away.</li>'+
'</ul>'+
'<div class="callout warn">'+WARN+'<div>Be cautious with links and attachments from unknown senders. When something looks off, check with your manager before clicking.</div></div>'+
'<h2>Troubleshooting</h2>'+
'<table class="dtable"><thead><tr><th>Problem</th><th>Try this</th></tr></thead><tbody>'+
'<tr><td>Can\'t sign in</td><td>Check your ID format and PIN; ask your manager to confirm them</td></tr>'+
'<tr><td>Tracker keeps pausing</td><td>You may be idle — stay active or use Pause/bio-break intentionally</td></tr>'+
'<tr><td>No one hears you in voice</td><td>Check mic permissions in the browser; unmute your bubble</td></tr>'+
'<tr><td>Camera won\'t show</td><td>Allow camera in the browser and use an updated Chrome/Edge</td></tr>'+
'</tbody></table>' }
};

var EYE='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
var EYEOFF='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

document.getElementById('login-logo').src = LOGO;
document.getElementById('hdr-logo').src = LOGO;
document.getElementById('peye').innerHTML = EYE;
document.getElementById('peye').addEventListener('click', function(){
  var i=document.getElementById('lpin'); var show=i.type==='password'; i.type=show?'text':'password'; this.innerHTML=show?EYEOFF:EYE;
});
document.getElementById('lpin').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('lid').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('lpin').focus(); });

function driveLink(url){ if(!url) return ''; var m=String(url).match(/[-\w]{25,}/); return m?'https://drive.google.com/thumbnail?id='+m[0]+'&sz=w200':url; }
function bdayDate(b){ if(!b) return null; var s=String(b).trim(); var d=new Date(s.length===10? s+'T12:00:00' : s); return isNaN(d.getTime())?null:d; }
function fmtBday(b){ var d=bdayDate(b); return d? d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''; }
function ageFrom(b){ var d=bdayDate(b); if(!d) return ''; var t=new Date(); var a=t.getFullYear()-d.getFullYear(); var m=t.getMonth()-d.getMonth(); if(m<0||(m===0&&t.getDate()<d.getDate())) a--; return (a>=0&&a<120)? a : ''; }
function daysToBday(b){ var d=bdayDate(b); if(!d) return null; var t=new Date(); t.setHours(0,0,0,0); var n=new Date(t.getFullYear(), d.getMonth(), d.getDate()); if(n<t) n=new Date(t.getFullYear()+1, d.getMonth(), d.getDate()); return Math.round((n-t)/86400000); }
function firstName(n){ n=String(n||'').trim(); if(n.indexOf(',')>=0){ return (n.split(',')[1]||'').trim().split(/\s+/)[0]||n; } return n.split(/\s+/)[0]||n; }
function initials(n){ n=String(n||'').trim(); var p=n.indexOf(',')>=0?[n.split(',')[1],n.split(',')[0]]:n.split(/\s+/); return ((p[0]||' ')[0]+((p[1]||' ').trim()[0]||'')).toUpperCase(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

async function doLogin(){
  var id=document.getElementById('lid').value.trim();
  var pin=document.getElementById('lpin').value.trim();
  var err=document.getElementById('lerr'), btn=document.getElementById('lbtn');
  err.style.display='none';
  if(!id||!pin){ err.textContent='Enter your employee ID and PIN.'; err.style.display='block'; return; }
  // Admin shortcut: sign in with "ADMIN" + the admin password
  if(id.toUpperCase()==='ADMIN'){
    if(pin===ADMIN_PASS){
      var au={ full_name:'Admin (JMB Virtuals)', employee_id:'ADMIN', position:'Administrator', department:'Management', photo:'' };
      sessionStorage.setItem('internals_user', JSON.stringify(au));
      enterApp(au);
    } else { err.textContent='Invalid admin password.'; err.style.display='block'; }
    return;
  }
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    var res=await fetch(APPS_SCRIPT_URL+'?id='+encodeURIComponent(id)+'&pin='+encodeURIComponent(pin));
    var data=await res.json();
    if(!data || data.error || !data.employee_id){ throw new Error(data&&data.error||'Invalid ID or PIN.'); }
    sessionStorage.setItem('internals_user', JSON.stringify(data));
    enterApp(data);
  }catch(e){
    err.textContent = (e.message==='Invalid ID or PIN.')?'Invalid ID or PIN.':'Could not sign in. Check your ID/PIN and try again.';
    err.style.display='block';
  }finally{ btn.disabled=false; btn.textContent='Sign in'; }
}
function doLogout(){ sessionStorage.removeItem('internals_user'); location.reload(); }

function enterApp(user){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  var fn=firstName(user.full_name||user.employee_id);
  document.getElementById('who-name').textContent=fn;
  document.getElementById('hero-name').textContent=fn;
  renderLinks(); renderTools(); renderAnnouncements(); renderResources(); tickClock(); setInterval(tickClock,1000);
  loadTeam();
}

function renderLinks(){
  document.getElementById('links').innerHTML = QUICK_LINKS.map(function(l){
    return '<a class="link" href="'+l.url+'" target="_blank" rel="noopener"><span class="ic">'+l.icon+'</span>'+
      '<span class="tx"><b>'+l.title+'</b><span>'+l.sub+'</span></span>'+
      '<span class="go"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span></a>';
  }).join('');
}
function renderTools(){
  var go='<span class="go"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>';
  document.getElementById('tools').innerHTML = TOOLS.filter(function(t){ return t.url && t.url!=='#'; }).map(function(t){   // only show published tools/automations
    var badge='<span class="badge '+(t.kind==='auto'?'auto':'tool')+'">'+(t.kind==='auto'?'Automation':'Tool')+'</span>';
    var inner='<span class="ic">'+t.icon+'</span><span class="tx"><b>'+esc(t.title)+'</b><span>'+esc(t.sub)+'</span></span>'+badge;
    return '<a class="link" href="'+t.url+'" target="_blank" rel="noopener">'+inner+go+'</a>';
  }).join('');
}
function renderAnnouncements(){
  var el=document.getElementById('announcements');
  if(!ANNOUNCEMENTS.length){ el.innerHTML='<div class="muted">No announcements right now.</div>'; return; }
  el.innerHTML=ANNOUNCEMENTS.map(function(a){
    return '<div class="ann"><span class="dot"></span><div><div class="at">'+esc(a.title)+'</div><div class="ad">'+a.body+'</div><div class="am">'+esc(a.date||'')+'</div></div></div>';
  }).join('');
}
function renderResources(){
  document.getElementById('resources').innerHTML = RESOURCES.map(function(r){
    return '<a onclick="openDoc(\''+r.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+r.title+'</a>';
  }).join('');
}
function openDoc(id){
  var d=SOP_DOCS[id]; if(!d) return;
  document.getElementById('doc-bar-title').textContent=d.title;
  document.getElementById('doc-content').innerHTML=
    '<div class="dochead"><div class="dic">'+(d.icon||'')+'</div><h1>'+esc(d.title)+'</h1>'+
    '<div class="dmeta">'+esc(d.updated||'')+'</div></div><div class="doc">'+d.html+'</div>';
  var m=document.getElementById('doc-modal');
  m.classList.add('open'); m.scrollTop=0; document.body.style.overflow='hidden';
}
function closeDoc(){
  document.getElementById('doc-modal').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeDoc(); });
function tickClock(){
  try{
    var now=new Date();
    var pht=now.toLocaleString('en-US',{timeZone:'Asia/Manila',weekday:'long',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('clock').textContent='Manila · '+pht;
  }catch(e){}
}
async function loadTeam(){
  var el=document.getElementById('team');
  try{
    var res=await fetch(APPS_SCRIPT_URL+'?action=get_all_employees&_='+Date.now());   // _= busts any cached response so status is fresh
    var d=await res.json();
    var list=((d&&d.employees)||[]).filter(function(e){
      if(!e||!e.employee_id) return false;
      var st=String(e.status||'').toLowerCase();
      return st!=='inactive' && st!=='deactivated' && st!=='disabled';   // hide deactivated employees from the team
    });
    if(!list.length){ el.innerHTML='<div class="muted">No team members found.</div>'; return; }
    list.sort(function(a,b){ return (a.employee_id||'').localeCompare(b.employee_id||''); });
    el.innerHTML=list.map(function(e){
      var photo=e.photo?driveLink(e.photo):'';
      var av=photo ? '<img class="av" src="'+photo+'" alt="">' : '<div class="ph">'+initials(e.full_name||e.employee_id)+'</div>';
      var bd=fmtBday(e.birthday), ag=ageFrom(e.birthday);
      var soon=daysToBday(e.birthday);
      var bdayLine = bd ? '<div class="bd'+(soon!==null&&soon<=7?' soon':'')+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-8H4v8M4 16h16M2 21h20M7 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm5 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm5 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM7 8v5M12 8v5M17 8v5"/></svg><span>'+esc(bd)+'</span>'+(ag!==''?'<span class="bage">'+ag+' yrs</span>':'')+'</div>' : '';
      return '<div class="tm">'+av+'<div class="nm">'+esc(e.full_name||e.employee_id)+'</div><div class="ps">'+esc(e.position||'')+'</div>'+bdayLine+'</div>';
    }).join('');
    renderBirthdays(list);
  }catch(e){ el.innerHTML='<div class="muted">Could not load the team.</div>'; }
}
function renderBirthdays(list){
  var strip=document.getElementById('bday-strip'); if(!strip) return;
  var up=list.map(function(e){ return { e:e, d:daysToBday(e.birthday) }; })
            .filter(function(x){ return x.d!==null && x.d<=45; })
            .sort(function(a,b){ return a.d-b.d; })
            .slice(0,6);
  if(!up.length){ strip.style.display='none'; return; }
  function whenLbl(d){ if(d===0) return 'Today'; if(d===1) return 'Tomorrow'; return 'in '+d+' days'; }
  strip.innerHTML='<div class="bcard"><div class="bhead">'+
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-8H4v8M4 16h16M2 21h20M7 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm5 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm5 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM7 8v5M12 8v5M17 8v5"/></svg>'+
    'Upcoming birthdays</div><div class="blist">'+
    up.map(function(x){
      var e=x.e, photo=e.photo?driveLink(e.photo):'';
      var av=photo ? '<img class="bav" src="'+photo+'" alt="">' : '<div class="bph">'+initials(e.full_name||e.employee_id)+'</div>';
      return '<div class="bitem'+(x.d===0?' today':'')+'">'+av+'<div><div class="bnm">'+esc(firstName(e.full_name||e.employee_id))+'</div>'+
        '<div class="bwhen">'+esc(fmtBday(e.birthday))+' · '+whenLbl(x.d)+'</div></div></div>';
    }).join('')+'</div></div>';
  strip.style.display='block';
}

/* keep session across refresh */
(function(){
  try{ var u=sessionStorage.getItem('internals_user'); if(u) enterApp(JSON.parse(u)); }catch(e){}
})();
</script>
