<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JMB Virtuals — Applicant Assessment</title>
<style>
  :root{ --bg:#0d0d0f; --card:#16161a; --card2:#1d1d22; --t1:#f4f4f6; --t2:#b8b8c0; --t3:#7c7c86; --o3:#ff6b1a; --o2:#ff8a4a; --border:rgba(255,255,255,.08); --border-hi:rgba(255,107,26,.4); --g:#22c55e; --r:#ef4444; --b:#378add; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:radial-gradient(1200px 600px at 50% -10%, rgba(255,107,26,.10), transparent), var(--bg); color:var(--t1); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; min-height:100vh; }
  .wrap{ max-width:760px; margin:0 auto; padding:24px 18px 70px; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .logo{ width:40px; height:40px; border-radius:11px; background:linear-gradient(135deg,var(--o3),var(--o2)); display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; }
  h1{ font-size:24px; margin:16px 0 6px; }
  .sub{ color:var(--t2); font-size:14px; line-height:1.6; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; margin-top:18px; }
  .bar{ position:sticky; top:0; z-index:6; background:rgba(13,13,15,.92); backdrop-filter:blur(6px); border:1px solid var(--border); border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:14px; margin:14px 0 2px; }
  .timer{ font-size:15px; font-weight:800; display:inline-flex; gap:7px; align-items:center; white-space:nowrap; }
  .timer.warn{ color:#fca5a5; }
  .prog{ flex:1; height:8px; background:var(--card2); border-radius:6px; overflow:hidden; }
  .prog i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--o3),var(--o2)); transition:width .25s; }
  .pcount{ font-size:13px; color:var(--t2); white-space:nowrap; font-weight:600; }
  .sec-h{ font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--o2); font-weight:700; margin:26px 0 4px; display:flex; align-items:center; gap:8px; }
  .sec-h .n{ font-size:11px; color:var(--t3); font-weight:600; }
  .sec-h:first-child{ margin-top:4px; }
  .q{ margin:16px 0 4px; font-size:15px; line-height:1.5; }
  .q b{ color:var(--t3); margin-right:6px; }
  .opts{ display:grid; gap:8px; margin:10px 0 16px; }
  .opt{ display:flex; align-items:center; gap:10px; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:10px 13px; cursor:pointer; font-size:14px; transition:border-color .12s, background .12s; }
  .opt:hover{ border-color:var(--border-hi); }
  .opt.sel{ border-color:var(--o3); background:rgba(255,107,26,.10); }
  .opt input{ accent-color:var(--o3); }
  .btn{ background:linear-gradient(135deg,var(--o3),var(--o2)); color:#fff; border:none; border-radius:11px; padding:13px 22px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .btn:disabled{ opacity:.55; cursor:not-allowed; }
  .btn.ghost{ background:none; border:1px solid var(--border); color:var(--t2); }
  .passage{ background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:14px; font-size:15.5px; line-height:1.8; color:var(--t2); user-select:none; }
  textarea{ width:100%; min-height:160px; margin-top:12px; background:var(--card2); border:1px solid var(--border); border-radius:10px; color:var(--t1); padding:12px; font-size:15.5px; line-height:1.7; font-family:inherit; outline:none; }
  textarea:focus{ border-color:var(--border-hi); }
  .stat-row{ display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
  .stat{ background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:9px 14px; font-size:13px; }
  .stat b{ color:var(--o2); font-size:16px; }
  .center{ text-align:center; }
  .done .check{ width:64px; height:64px; border-radius:50%; background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.4); display:flex; align-items:center; justify-content:center; margin:8px auto 18px; }
  .muted{ color:var(--t3); font-size:13px; }
  .err-box{ text-align:center; padding:36px 20px; }
  .pill{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; background:rgba(55,138,221,.15); color:#8bc0f0; margin-left:8px; }
  .note{ background:rgba(255,107,26,.08); border:1px solid var(--border-hi); border-radius:10px; padding:11px 13px; font-size:13px; color:var(--t2); margin-top:14px; }
  /* proctoring: block selection of quiz text (inputs stay editable) */
  body.lock, body.lock .q, body.lock .opt, body.lock .passage, body.lock .sec-h, body.lock h1, body.lock .sub, body.lock .pill{ -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; }
  body.lock textarea, body.lock input{ -webkit-user-select:text; user-select:text; }
  .cam{ position:fixed; right:16px; bottom:16px; width:168px; z-index:55; border-radius:12px; overflow:hidden; border:2px solid var(--border-hi); background:#000; box-shadow:0 8px 28px rgba(0,0,0,.55); }
  .cam video{ width:100%; display:block; transform:scaleX(-1); }
  .cam .lbl{ position:absolute; top:6px; left:6px; background:rgba(239,68,68,.92); color:#fff; font-size:10px; font-weight:800; letter-spacing:.04em; padding:2px 8px; border-radius:20px; display:flex; align-items:center; gap:5px; }
  .cam .dot{ width:6px; height:6px; border-radius:50%; background:#fff; animation:blink 1.2s infinite; }
  @keyframes blink{ 50%{ opacity:.15; } }
  .warnbar{ position:fixed; top:0; left:0; right:0; z-index:70; background:#ef4444; color:#fff; text-align:center; padding:10px; font-size:13px; font-weight:700; display:none; }
  .cover{ position:fixed; inset:0; z-index:65; background:rgba(8,8,10,.99); display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; }
  .cover h2{ font-size:22px; margin:0 0 8px; }
  .cover p{ color:var(--t2); font-size:14px; max-width:420px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="logo">JMB</div><div><div style="font-weight:700;font-size:15px;">JMB Virtuals</div><div style="font-size:12px;color:var(--t3);">Applicant Assessment</div></div></div>
  <div id="root"></div>
  <div class="center muted" style="margin-top:28px;">© JMB Virtuals · Recruitment</div>
</div>

<script>
var HR_URL = "https://script.google.com/macros/s/AKfycbyf_V9JIV8x_MqT4eibw9okSWt9ZjyvEYM09nZBEMNLiiyximXIKX6ojc7aLpiRaffN/exec";
var $ = function(id){ return document.getElementById(id); };
function qsp(k){ var m=new RegExp('[?&]'+k+'=([^&]*)').exec(location.search); return m?decodeURIComponent(m[1]):''; }
var ID = qsp('id'), TOKEN = qsp('token');
var CAND = null, LSKEY = 'jmbhr_assess_'+ID+'_'+TOKEN;

/* ===== 50-QUESTION BANK · Senior High School level ===== */
var BANK = {
  grammar: [
    { q:"Choose the correct sentence.", o:["She doesn't like coffee.", "She don't like coffee.", "She doesn't likes coffee.", "She not like coffee."], a:0 },
    { q:"Neither the manager nor the staff ___ aware of the change.", o:["was", "were", "are", "been"], a:0 },
    { q:"Choose the correctly punctuated sentence.", o:["It's a beautiful day, isn't it?", "Its a beautiful day, isn't it?", "Its' a beautiful day, isnt it?", "Its a beautiful day isnt it?"], a:0 },
    { q:"Yesterday, they ___ the report to the client.", o:["sent", "send", "sended", "had send"], a:0 },
    { q:"Please give the documents to Maria and ___.", o:["me", "I", "myself", "mine"], a:0 },
    { q:"Which word is spelled correctly?", o:["Receive", "Recieve", "Receeve", "Receve"], a:0 },
    { q:"She is ___ honest employee.", o:["an", "a", "the", "no article"], a:0 },
    { q:"Choose the sentence with correct subject-verb agreement.", o:["The list of items is on the desk.", "The list of items are on the desk.", "The list of items were on the desk.", "The list of items been on the desk."], a:0 },
    { q:"The meeting is scheduled ___ Monday.", o:["on", "in", "at", "by"], a:0 },
    { q:"This task is ___ than the previous one.", o:["easier", "more easy", "more easier", "most easy"], a:0 },
    { q:"Choose the grammatically correct sentence.", o:["He has gone to the office.", "He has went to the office.", "He have gone to the office.", "He has going to the office."], a:0 },
    { q:"Their training had a positive ___ on sales.", o:["effect", "affect", "affects", "efect"], a:0 },
    { q:"Choose the correct sentence.", o:["My team and I finished the project.", "Me and my team finished the project.", "My team and me finished the project.", "I and my team finished the project."], a:0 },
    { q:"If I ___ you, I would apologize.", o:["were", "was", "am", "be"], a:0 },
    { q:"Choose the sentence with the correct apostrophe (one client).", o:["The client's feedback was positive.", "The clients feedback was positive.", "The clients' feedback was positive.", "The clients's feedback was positive."], a:0 },
    { q:"She ___ here since 2020.", o:["has been working", "works", "is working", "worked"], a:0 },
    { q:"Keep ___ the good work!", o:["up", "on", "in", "at"], a:0 },
    { q:"Choose the correct sentence.", o:["They're going to the seminar.", "There going to the seminar.", "Their going to the seminar.", "Theyre going to the seminar."], a:0 },
    { q:"The instructions were very ___; everyone understood them.", o:["clear", "clearly", "clearness", "cleared"], a:0 },
    { q:"Choose the correct sentence.", o:["I look forward to hearing from you.", "I look forward to hear from you.", "I look forward hearing from you.", "I look forward to heard from you."], a:0 }
  ],
  mathlogic: [
    { q:"What is 15% of 200?", o:["30", "15", "45", "20"], a:0 },
    { q:"A task takes 3 hours for 2 people. At the same rate, how long for 6 people?", o:["1 hour", "9 hours", "2 hours", "3 hours"], a:0 },
    { q:"Solve: 8 + 6 \u00f7 2 \u00d7 3 = ?", o:["17", "21", "11", "42"], a:0 },
    { q:"A product costs \u20b11,200. With a 25% discount, the final price is?", o:["\u20b1900", "\u20b1300", "\u20b1950", "\u20b11,000"], a:0 },
    { q:"What is the next number in the series: 2, 6, 12, 20, 30, ___?", o:["42", "40", "36", "44"], a:0 },
    { q:"If 5 posts take 1 hour, how many posts can be made in 8 hours (same rate)?", o:["40", "13", "35", "45"], a:0 },
    { q:"Convert 3/4 to a percentage.", o:["75%", "34%", "43%", "70%"], a:0 },
    { q:"A post got 250 likes from 1,000 views. What is the engagement rate?", o:["25%", "2.5%", "40%", "4%"], a:0 },
    { q:"What is 12 \u00d7 11?", o:["132", "121", "144", "122"], a:0 },
    { q:"If x + 7 = 20, what is x?", o:["13", "27", "14", "12"], a:0 },
    { q:"Which number is the odd one out: 3, 5, 8, 11, 17?", o:["8", "3", "11", "17"], a:0 },
    { q:"A file is 2 GB. How many MB is that? (1 GB = 1024 MB)", o:["2048 MB", "1024 MB", "512 MB", "200 MB"], a:0 },
    { q:"All managers are employees. Which statement MUST be true?", o:["All managers are employees.", "All employees are managers.", "All employees are leads.", "No managers are employees."], a:0 },
    { q:"If today is Wednesday, what day will it be in 10 days?", o:["Saturday", "Friday", "Sunday", "Monday"], a:0 },
    { q:"200 is what percent of 800?", o:["25%", "40%", "20%", "50%"], a:0 }
  ],
  tech: [
    { q:"Which is Meta's own tool for managing and scheduling Facebook & Instagram content?", o:["Meta Business Suite", "Canva", "Trello", "Zoom"], a:0 },
    { q:"In marketing, CTA stands for:", o:["Call to Action", "Click the Ad", "Content Type Analysis", "Customer Target Audience"], a:0 },
    { q:"Which app is widely used to create graphics without advanced design software?", o:["Canva", "Notepad", "Slack", "Excel"], a:0 },
    { q:"In Google Sheets, which function adds up a range of numbers?", o:["=SUM()", "=COUNT()", "=IF()", "=TEXT()"], a:0 },
    { q:"On social media, a hashtag (#) is mainly used to:", o:["Categorize content so it's discoverable by topic", "Tag a friend privately", "Delete a post", "Boost internet speed"], a:0 },
    { q:"Which app is popular for editing short-form vertical videos?", o:["CapCut", "WordPad", "Outlook", "Chrome"], a:0 },
    { q:"Which of these counts as engagement on a post?", o:["Likes, comments, shares, and saves", "Only the caption length", "The time of posting", "The account's follower count"], a:0 },
    { q:"Which tool uses boards, lists, and cards to manage tasks?", o:["Trello", "Photoshop", "Gmail", "Spotify"], a:0 },
    { q:"Which file format best keeps a logo's transparent background?", o:["PNG", "JPG", "MP4", "DOCX"], a:0 },
    { q:"On social platforms, DM means:", o:["Direct Message", "Data Memory", "Daily Metric", "Digital Marketing"], a:0 },
    { q:"Which platform is best known for professional networking?", o:["LinkedIn", "TikTok", "Pinterest", "Snapchat"], a:0 },
    { q:"What is the standard vertical aspect ratio for a Reel or TikTok video?", o:["9:16", "16:9", "1:1", "4:3"], a:0 },
    { q:"Which is a third-party tool for scheduling posts across multiple platforms?", o:["Hootsuite", "Photoshop", "Notepad", "Calculator"], a:0 },
    { q:"On social media, reach measures:", o:["The number of unique people who saw your content", "The number of posts you made", "Your total followers", "The number of hashtags used"], a:0 },
    { q:"Which is the SAFEST way to handle a client's account passwords?", o:["Store them in a trusted password manager", "Post them in the group chat", "Reuse one password for all accounts", "Email them in plain text"], a:0 }
  ]
};
(function(){ ['grammar','mathlogic','tech'].forEach(function(k){ BANK[k].forEach(function(it){ var c=it.o[it.a]; for(var i=it.o.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=it.o[i];it.o[i]=it.o[j];it.o[j]=t;} it.a=it.o.indexOf(c); }); }); })();
var SECTIONS=[['Grammar','grammar'],['Mathematics & Logic','mathlogic'],['Technology · VA & SMM','tech']];
var TOTAL_Q = BANK.grammar.length + BANK.mathlogic.length + BANK.tech.length;  // 50

var TYPING_PASSAGE = "A reliable virtual assistant keeps every project organized, communicates clearly, and consistently meets deadlines. Attention to detail separates good work from great work, so always proofread messages and double check numbers before sending anything to a client. When problems appear, a calm and solution focused attitude makes a real difference for the whole team. Staying dependable, honest, and easy to work with builds the kind of trust that turns a short engagement into a long term partnership. Take pride in small tasks, because doing the little things well is exactly what clients remember and reward over time.";

var QUIZ_SECONDS = 25*60, TYPE_SECONDS = 5*60;
var state = { answers:{}, quizEnd:0, quizTimer:null, typeTimer:null, typeStart:0, quizScores:null, result:null };

var HR_CONTACT = 'virtualsjmb@gmail.com';   // office / HR contact shown in invites
var OFFICE_INVITE = 'If you don’t have access to a laptop or computer'+
  ', you’re warmly invited to take the exam at the <b>JMB Virtuals office</b>. '+
  'Just reply to your assessment email or contact our HR team at <b>'+HR_CONTACT+'</b> to schedule a visit.';

/* ---------- bootstrap ---------- */
(function init(){
  if(isMobileDevice()){ renderDeskOnly(); return; }
  if(!ID || !TOKEN){ renderError('This assessment link is missing information. Please use the exact link from your email.'); return; }
  fetch(HR_URL+'?action=assess_get&id='+encodeURIComponent(ID)+'&token='+encodeURIComponent(TOKEN))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error==='already_done'){ clearSaved(); renderError('You have already completed this assessment. Thank you!'); return; }
      if(d.error || !d.ok){ renderError('This assessment link is invalid or has expired. Please check your email for the correct link.'); return; }
      CAND = d; renderIntro();
    })
    .catch(function(){ renderError('We couldn’t load your assessment. Please check your connection and try again.'); });
})();

function renderError(msg, retry){ $('root').innerHTML = '<div class="card err-box"><h1 style="margin-top:0;">Assessment unavailable</h1><p class="sub">'+msg+'</p>'+(retry?'<div style="margin-top:18px"><button class="btn" onclick="retrySubmit()">Retry submitting my results</button></div>':'')+'</div>'; }

function renderIntro(){
  $('root').innerHTML =
    '<h1>Welcome'+(CAND.name?(', '+esc(firstName(CAND.name))):'')+'!</h1>'+
    '<p class="sub">You passed the resume screening'+(CAND.position?(' for <b>'+esc(CAND.position)+'</b>'):'')+'. This assessment has two parts:</p>'+
    '<div class="card">'+
      '<p style="margin:0 0 10px;"><b>Part 1 — Written exam</b> <span class="pill">'+TOTAL_Q+' questions · 25 min · 70%</span></p>'+
      '<p class="muted" style="margin:0 0 16px;">Multiple choice: Grammar (20, Senior High School level), Mathematics &amp; Logic (15), and Technology / VA &amp; SMM platforms (15).</p>'+
      '<p style="margin:0 0 10px;"><b>Part 2 — Typing test</b> <span class="pill">5 min · 3 attempts · 30%</span></p>'+
      '<p class="muted" style="margin:0 0 18px;">Type a passage as accurately and quickly as you can. 5 minutes per attempt, up to 3 attempts — your <b>best</b> counts. Target: <b>40 WPM</b>.</p>'+
      '<div class="note"><b>Proctored exam.</b> Copying, printing, and screenshots are disabled. Please stay on this tab — switching away is recorded. Your answers autosave on this device.</div>'+
      '<div style="margin-top:18px"><button class="btn" onclick="startAssessment()">Start assessment</button></div>'+
    '</div>';
}

/* ---------- device + webcam gate ---------- */
function isMobileDevice(){
  var ua=navigator.userAgent||'';
  if(/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Tablet|Silk|Kindle|PlayBook/i.test(ua)) return true;
  var coarse = window.matchMedia && window.matchMedia('(pointer:coarse)').matches;
  if(coarse && Math.min(screen.width||9999, screen.height||9999) < 820) return true;
  return false;
}
function renderDeskOnly(){
  $('root').innerHTML='<div class="card err-box"><h1 style="margin-top:0;">Please use a desktop or laptop</h1>'+
    '<p class="sub">This assessment includes a typing test, so it can only be taken on a <b>desktop or laptop computer</b> — not on a phone or tablet.</p>'+
    '<p class="sub">'+OFFICE_INVITE+'</p></div>';
}
function startAssessment(){
  armProctor();
  startQuiz();
}
async function enableCamera(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
  try{
    state.camStream = await navigator.mediaDevices.getUserMedia({ video:{ width:{ideal:320}, height:{ideal:240} }, audio:false });
    showCam();
    return true;
  }catch(e){ return false; }
}
function showCam(){
  var box=$('cambox');
  if(!box){ box=document.createElement('div'); box.id='cambox'; box.className='cam'; box.innerHTML='<span class="lbl"><span class="dot"></span>REC</span><video id="camvid" autoplay playsinline muted></video>'; document.body.appendChild(box); }
  var v=$('camvid'); try{ v.srcObject=state.camStream; }catch(_){ }
  var tr=state.camStream && state.camStream.getVideoTracks()[0];
  if(tr) tr.onended=function(){ showWarn('Your webcam was turned off — please keep it on for the whole exam.'); };
}
function stopCam(){ try{ (state.camStream?state.camStream.getTracks():[]).forEach(function(t){ t.stop(); }); }catch(_){ } var b=$('cambox'); if(b) b.remove(); }
function renderCamRequired(){
  $('root').innerHTML='<div class="card err-box"><h1 style="margin-top:0;">Webcam access required</h1>'+
    '<p class="sub">This exam is proctored, so you must allow camera access to begin. Please click below and choose <b>Allow</b> when your browser asks for the camera.</p>'+
    '<p class="sub">'+OFFICE_INVITE.replace('laptop or computer','laptop, computer, or webcam')+'</p>'+
    '<div style="margin-top:16px"><button class="btn" onclick="startAssessment()">Enable camera &amp; start</button></div></div>';
}

/* ---------- proctoring: block copy / print / screenshot, tab-switch cover ---------- */
var _proctorArmed=false;
function armProctor(){
  if(_proctorArmed) return; _proctorArmed=true;
  document.body.classList.add('lock');
  document.addEventListener('contextmenu', blockEvt, true);
  document.addEventListener('copy', blockEvt, true);
  document.addEventListener('cut', blockEvt, true);
  document.addEventListener('selectstart', function(e){ var t=e.target; if(t && (t.tagName==='TEXTAREA'||t.tagName==='INPUT')) return; blockEvt(e); }, true);
  document.addEventListener('keydown', proctorKey, true);
  document.addEventListener('keyup', proctorKeyUp, true);
  window.addEventListener('blur', examBlur);
  window.addEventListener('focus', examFocus);
  document.addEventListener('visibilitychange', function(){ document.hidden?examBlur():examFocus(); });
}
function blockEvt(e){ e.preventDefault(); e.stopPropagation(); return false; }
function proctorKey(e){
  var k=(e.key||'').toLowerCase(), t=e.target, inField=(t&&(t.tagName==='TEXTAREA'||t.tagName==='INPUT'));
  if((e.ctrlKey||e.metaKey) && ['c','x','s','p','u'].indexOf(k)>=0){
    if(inField && (k==='c'||k==='x')) return;   // allow editing one's own typed answer
    blockEvt(e); return;
  }
  if((e.ctrlKey||e.metaKey) && k==='a' && !inField){ blockEvt(e); return; }
  if(k==='printscreen' || e.key==='PrintScreen' || e.key==='F12'){ blockEvt(e); }
}
function proctorKeyUp(e){
  if(e.key==='PrintScreen' || (e.key||'').toLowerCase()==='printscreen'){
    try{ if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(''); }catch(_){ }
    showWarn('Screenshots are not allowed during the assessment.');
  }
}
function showWarn(msg){
  var b=$('warnbar'); if(!b){ b=document.createElement('div'); b.id='warnbar'; b.className='warnbar'; document.body.appendChild(b); }
  b.textContent=msg; b.style.display='block';
  clearTimeout(window._warnT); window._warnT=setTimeout(function(){ b.style.display='none'; }, 3500);
}
function ensureCover(){
  var o=$('examcover'); if(!o){ o=document.createElement('div'); o.id='examcover'; o.className='cover'; o.innerHTML='<h2>Exam paused</h2><p>Please return to this tab and keep it in focus. Switching away during the exam is recorded.</p>'; document.body.appendChild(o); } return o;
}
function examBlur(){ if(!_proctorArmed) return; ensureCover().style.display='flex'; }
function examFocus(){ var o=$('examcover'); if(o) o.style.display='none'; }

/* ---------- quiz ---------- */
function startQuiz(){
  var saved=loadSaved();
  state.answers = (saved && saved.answers) ? saved.answers : {};
  state.quizEnd = (saved && saved.quizEnd && saved.quizEnd>Date.now()) ? saved.quizEnd : (Date.now() + QUIZ_SECONDS*1000);
  var html = '<div class="bar"><span class="timer" id="qtimer">⏱ 25:00</span><div class="prog"><i id="qprog"></i></div><span class="pcount" id="qcount">0 / '+TOTAL_Q+'</span></div><div class="card">';
  SECTIONS.forEach(function(sec){ html += secBlock(sec[0], sec[1]); });
  html += '<div style="margin-top:24px;display:flex;justify-content:flex-end;gap:10px;align-items:center;"><span class="muted" id="unanswered"></span><button class="btn" id="quiz-next" onclick="finishQuiz(false)">Continue to typing test</button></div>';
  html += '</div>';
  $('root').innerHTML = html;
  // restore selections visually
  Object.keys(state.answers).forEach(function(qid){ markSel(qid, state.answers[qid]); });
  updateProgress();
  tickQuiz();
  state.quizTimer = setInterval(tickQuiz, 1000);
}
function secBlock(title, key){
  var html = '<div class="sec-h">'+title+' <span class="n">('+BANK[key].length+' questions)</span></div>';
  BANK[key].forEach(function(item, i){
    var qid = key+'_'+i;
    html += '<div class="q"><b>Q'+(i+1)+'.</b>'+esc(item.q)+'</div><div class="opts">';
    item.o.forEach(function(opt, oi){
      html += '<label class="opt" id="opt_'+qid+'_'+oi+'" onclick="pick(\''+qid+'\','+oi+')"><input type="radio" name="'+qid+'">'+esc(opt)+'</label>';
    });
    html += '</div>';
  });
  return html;
}
function markSel(qid, oi){
  var grp=document.getElementsByName(qid);
  for(var i=0;i<grp.length;i++){ var lab=$('opt_'+qid+'_'+i); if(lab) lab.classList.toggle('sel', i===oi); }
  var radio=document.querySelector('#opt_'+qid+'_'+oi+' input'); if(radio) radio.checked=true;
}
function pick(qid, oi){ state.answers[qid]=oi; markSel(qid, oi); updateProgress(); saveProgress(); }
function answeredCount(){ return Object.keys(state.answers).length; }
function updateProgress(){
  var n=answeredCount(), pct=Math.round(n/TOTAL_Q*100);
  if($('qcount')) $('qcount').textContent=n+' / '+TOTAL_Q;
  if($('qprog')) $('qprog').style.width=pct+'%';
  if($('unanswered')) $('unanswered').textContent = n<TOTAL_Q ? ((TOTAL_Q-n)+' unanswered') : 'All answered ✓';
}
function tickQuiz(){
  var left = Math.max(0, Math.round((state.quizEnd - Date.now())/1000));
  var el=$('qtimer'); if(el){ el.textContent='⏱ '+mss(left); el.classList.toggle('warn', left<=120); }
  if(left<=0){ finishQuiz(true); }
}
function scoreQuiz(){
  var out={correct:0};
  ['grammar','mathlogic','tech'].forEach(function(key){
    var c=0; BANK[key].forEach(function(item,i){ if(state.answers[key+'_'+i]===item.a) c++; });
    out[key]=Math.round(c/BANK[key].length*100); out.correct+=c;
  });
  return out;
}
function finishQuiz(auto){
  if(!auto){
    var miss=TOTAL_Q-answeredCount();
    if(miss>0 && !confirm('You have '+miss+' unanswered question'+(miss>1?'s':'')+'. Unanswered questions are marked wrong. Continue to the typing test anyway?')) return;
  }
  if(state.quizTimer){ clearInterval(state.quizTimer); state.quizTimer=null; }
  state.quizScores = scoreQuiz();
  saveProgress();
  startTyping(auto);
}

/* ---------- typing (5 minutes · up to 3 attempts, best counts) ---------- */
function startTyping(auto){
  state.attemptNo = (state.attemptNo||0) + 1;
  state.typeStart = null;
  if(state.typeTimer){ clearInterval(state.typeTimer); state.typeTimer=null; }
  $('root').innerHTML =
    (auto?'<p class="sub" style="color:#fca5a5;">Quiz time is up — your answers were saved. Now the typing test.</p>':'')+
    '<div class="bar"><span class="timer" id="t-timer">\u23F1 5:00</span><div class="prog"><i id="t-prog"></i></div><span class="pcount"><span id="t-wpm">0</span> wpm \u00B7 <span id="t-acc">100</span>%</span></div>'+
    '<h1 style="margin-top:14px;">Typing test <span style="font-size:14px;color:#9aa3b2;font-weight:500;">\u2014 Attempt '+state.attemptNo+' of 3</span></h1>'+
    '<p class="sub">Type the passage below exactly. The 5-minute timer starts the moment you begin typing. Target: <b>40 WPM</b>. Your <b>best</b> of 3 attempts counts.</p>'+
    '<div class="card">'+
      '<div class="passage" id="passage">'+esc(TYPING_PASSAGE)+'</div>'+
      '<textarea id="type-in" placeholder="Start typing here\u2026" oninput="onType()" onpaste="return false" oncontextmenu="return false" spellcheck="false"></textarea>'+
      '<div style="margin-top:18px;display:flex;justify-content:flex-end;"><button class="btn" id="finish-btn" onclick="finishAttempt(false)">Finish attempt</button></div>'+
    '</div>';
}
function onType(){ if(!state.typeStart){ state.typeStart=Date.now(); state.typeTimer=setInterval(tickType,200); } updateTypeStats(); }
function tickType(){
  var elapsed=Math.round((Date.now()-state.typeStart)/1000), left=Math.max(0, TYPE_SECONDS-elapsed);
  if($('t-timer')){ $('t-timer').textContent='\u23F1 '+mss(left); $('t-timer').classList.toggle('warn', left<=30); }
  if($('t-prog')) $('t-prog').style.width=Math.min(100, elapsed/TYPE_SECONDS*100)+'%';
  if(left<=0){ finishAttempt(true); }
}
// Edit-distance so a single early miss doesn't wreck alignment (positional compare does).
function _lev(a,b){
  a=a||''; b=b||''; var n=a.length, m=b.length;
  if(!n) return m; if(!m) return n;
  var prev=new Array(m+1), cur=new Array(m+1), i, j;
  for(j=0;j<=m;j++) prev[j]=j;
  for(i=1;i<=n;i++){
    cur[0]=i;
    for(j=1;j<=m;j++){
      var cost=(a.charCodeAt(i-1)===b.charCodeAt(j-1))?0:1;
      cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
    }
    var t=prev; prev=cur; cur=t;
  }
  return prev[m];
}
function typingStats(){
  var typed=$('type-in')?$('type-in').value:'';
  var elapsedMin = state.typeStart ? Math.max((Date.now()-state.typeStart)/60000, 1/60) : 1;
  var L=typed.length;
  var ref=TYPING_PASSAGE.substring(0, L);                 // the passage they were meant to type so far
  var dist=L? _lev(typed, ref) : 0;
  var acc=L? Math.max(0, Math.min(100, Math.round((1 - dist/Math.max(L,1))*100))) : 100;
  var gross=Math.round((L/5)/elapsedMin);                 // standard: 1 "word" = 5 characters
  var net=Math.max(0, Math.round(gross*acc/100));         // errors reduce effective speed
  return { wpm:net, gross:gross, acc:acc, chars:L };
}
function updateTypeStats(){ var s=typingStats(); if($('t-wpm')) $('t-wpm').textContent=s.wpm; if($('t-acc')) $('t-acc').textContent=s.acc; }
function typingScore(s){ return Math.max(0, Math.min(100, Math.round(s.wpm/40*100))); }  // s.wpm is net (accuracy already applied)
function finishAttempt(auto){
  if(state.typeTimer){ clearInterval(state.typeTimer); state.typeTimer=null; }
  var ts=typingStats(), score=typingScore(ts);
  state.typeAttempts = state.typeAttempts||[];
  state.typeAttempts.push({ wpm:ts.wpm, acc:ts.acc, score:score });
  if(!state.bestType || score>state.bestType.score) state.bestType={ wpm:ts.wpm, acc:ts.acc, score:score };
  saveProgress();
  if(state.attemptNo>=3){ finalizeSubmit(); return; }
  renderAttemptDone(ts, score);
}
function renderAttemptDone(ts, score){
  var b=state.bestType;
  $('root').innerHTML='<div class="card center">'+
    '<h1 style="margin-top:0;">Attempt '+state.attemptNo+' of 3 complete</h1>'+
    '<p class="sub">This attempt: <b>'+ts.wpm+' WPM</b> \u00B7 '+ts.acc+'% accuracy.</p>'+
    '<p class="sub">Best so far: <b>'+b.wpm+' WPM</b> ('+b.acc+'% acc).</p>'+
    '<div style="margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">'+
      '<button class="btn" onclick="startTyping(false)">Try again (attempt '+(state.attemptNo+1)+' of 3)</button>'+
      '<button class="btn" style="opacity:.82" onclick="finalizeSubmit()">Finish &amp; submit best</button>'+
    '</div></div>';
}
function finalizeSubmit(){
  var qz=state.quizScores||scoreQuiz(); var best=state.bestType||{wpm:0,acc:0,score:0};
  var writtenPct=Math.round(qz.correct/TOTAL_Q*100);
  var overall=Math.round(writtenPct*0.7 + best.score*0.3);
  var detail=JSON.stringify({ grammar:qz.grammar, mathlogic:qz.mathlogic, tech:qz.tech, written:writtenPct, correct:qz.correct+'/'+TOTAL_Q, typing:best.score, wpm:best.wpm, accuracy:best.acc, attempts:(state.typeAttempts||[]).length, weighting:'written 70% + typing 30%' });
  state.result={ score:overall, detail:detail };
  renderSubmitting(); doSubmit();
}

function renderSubmitting(){
  $('root').innerHTML='<div class="card center"><h1 style="margin-top:0;">Submitting your results…</h1><p class="sub" id="sub-status">Please keep this page open.</p></div>';
}
async function doSubmit(){
  var r=state.result; if(!r) return;
  var url=HR_URL+'?action=assess_submit&id='+encodeURIComponent(ID)+'&token='+encodeURIComponent(TOKEN)+'&score='+encodeURIComponent(r.score)+'&detail='+encodeURIComponent(r.detail);
  for(var attempt=1; attempt<=4; attempt++){
    if($('sub-status') && attempt>1) $('sub-status').textContent='Retrying… (attempt '+attempt+' of 4)';
    try{
      var res=await fetch(url, { method:'GET' });
      var d=await res.json();
      if(d && d.ok){ clearSaved(); renderDone(); return; }
      if(d && d.error==='already_done'){ clearSaved(); renderDone(); return; }   // a prior attempt already saved it = success
      if(d && d.error==='invalid_link'){ renderError('This assessment link is invalid or has expired. Please contact HR.'); return; }
      // server responded with another error — wait then retry
    }catch(e){ /* network — retry */ }
    await sleep(900*attempt);
  }
  renderError('We couldn’t save your results automatically. Your answers are safe on this page — please click the button below to try again.', true);
}
function retrySubmit(){ renderSubmitting(); doSubmit(); }
function renderDone(){
  _proctorArmed=false; document.body.classList.remove('lock'); var ec=$('examcover'); if(ec) ec.style.display='none'; stopCam();
  $('root').innerHTML =
    '<div class="card done center">'+
      '<div class="check"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'+
      '<h1 style="margin:0 0 8px;">Assessment complete!</h1>'+
      '<p class="sub">Thank you for completing the JMB Virtuals assessment. Your results have been sent to our HR team, and we’ll be in touch about the next steps.</p>'+
    '</div>';
}

/* ---------- local autosave ---------- */
function saveProgress(){ try{ localStorage.setItem(LSKEY, JSON.stringify({ answers:state.answers, quizEnd:state.quizEnd })); }catch(e){} }
function loadSaved(){ try{ return JSON.parse(localStorage.getItem(LSKEY)||'null'); }catch(e){ return null; } }
function clearSaved(){ try{ localStorage.removeItem(LSKEY); }catch(e){} }

/* ---------- utils ---------- */
function firstName(n){ n=String(n||''); if(n.indexOf(',')>=0){ var p=n.split(','); return (p[1]||p[0]).trim(); } return n.split(/\s+/)[0]; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function mss(sec){ sec=Math.max(0,sec); return Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0'); }
function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
</script>
